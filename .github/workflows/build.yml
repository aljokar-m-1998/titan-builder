name: Titan WebView Builder Pro v3 (Unified)

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'URL of the app'
        required: true
      app_name:
        description: 'Name of the app'
        required: true
      icon_url:
        description: 'Icon URL (Optional)'
        required: false
        default: ''
      tracking_id:
        description: 'Tracking ID'
        required: true
      webhook_url:
        description: 'Webhook URL'
        required: true
      enable_location:
        description: 'Enable Location Permission'
        required: false
        default: 'false'
      enable_notifications:
        description: 'Enable Notifications Permission'
        required: false
        default: 'false'
      enable_camera:
        description: 'Enable Camera & Microphone Permission'
        required: false
        default: 'true'
      enable_storage:
        description: 'Enable Storage Permission'
        required: false
        default: 'true'
      hf_token:
        description: 'HF Token for CDN upload'
        required: true
      hf_dataset:
        description: 'HF Dataset repo (owner/name)'
        required: true
      build_type:
        description: 'Build type: webview | pwa_twa | twa_native'
        required: false
        default: 'webview'
      manifest_url:
        description: 'PWA manifest.json URL (for pwa_twa mode)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # ── Step 0: Detect build type ──────────────────────────────────────────
      - name: Detect Build Type
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          BUILD_TYPE="${BUILD_TYPE:-webview}"
          echo "BUILD_TYPE=$BUILD_TYPE" >> $GITHUB_ENV
          echo "🔍 Build type: $BUILD_TYPE"

      # ── Step 1 (TWA/PWA): Bubblewrap Build ─────────────────────────────────
      - name: Build TWA App with Bubblewrap
        if: env.BUILD_TYPE == 'pwa_twa' || env.BUILD_TYPE == 'twa_native'
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          APP_URL="${{ github.event.inputs.app_url }}"
          MANIFEST_URL="${{ github.event.inputs.manifest_url }}"
          TRACKING="${{ github.event.inputs.tracking_id }}"
          ICON_URL="${{ github.event.inputs.icon_url }}"
          HF_TOKEN="${{ github.event.inputs.hf_token }}"
          HF_DATASET="${{ github.event.inputs.hf_dataset }}"

          # Determine manifest URL
          if [ -z "$MANIFEST_URL" ]; then
            MANIFEST_URL="${APP_URL%/}/manifest.json"
          fi

          echo "📋 Manifest: $MANIFEST_URL"

          # Install Node + Bubblewrap
          node --version
          npm install -g @bubblewrap/cli 2>&1 | tail -3

          # Fetch manifest to get app info
          echo "📡 Fetching manifest..."
          curl -s -L "$MANIFEST_URL" -o /tmp/manifest.json || echo "{}" > /tmp/manifest.json
          cat /tmp/manifest.json | python3 -c "
          import json, sys, os
          try:
            m = json.load(sys.stdin)
            name = m.get('name', os.environ.get('APP_NAME','App'))
            short = m.get('short_name', name)[:12]
            color = m.get('theme_color','#1a1a2e').replace('#','')
            bg    = m.get('background_color','#ffffff').replace('#','')
            icons = m.get('icons',[])
            icon  = next((i['src'] for i in sorted(icons, key=lambda x: int(str(x.get('sizes','0x0')).split('x')[0]) if str(x.get('sizes','0x0')).split('x')[0].isdigit() else 0, reverse=True) if '512' in str(i.get('sizes','')) or '192' in str(i.get('sizes',''))), '')
            # Write to github env
            with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f'MANIFEST_NAME={name}\n')
              f.write(f'MANIFEST_SHORT={short}\n')
              f.write(f'MANIFEST_THEME={color}\n')
              f.write(f'MANIFEST_BG={bg}\n')
              f.write(f'MANIFEST_ICON={icon}\n')
            print(f'✅ name={name}, icon={icon}')
          except Exception as e:
            print(f'⚠️ manifest parse error: {e}')
            with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f'MANIFEST_NAME={os.environ.get(\"APP_NAME\",\"App\")}\n')
          " || true

          APP_SLUG=$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/_/g' | sed 's/__*/_/g' | sed 's/^_//;s/_$//')
          echo "APP_SLUG=$APP_SLUG" >> $GITHUB_ENV

          # Download icon
          ICON_SRC="${ICON_URL:-$MANIFEST_ICON}"
          if [ -n "$ICON_SRC" ]; then
            curl -sL "$ICON_SRC" -o /tmp/icon.png 2>/dev/null || true
          fi
          [ -f /tmp/icon.png ] && [ -s /tmp/icon.png ] || curl -sL "https://via.placeholder.com/512/1a1a2e/ffffff?text=${APP_SLUG:0:2}" -o /tmp/icon.png || true

          # Build bubblewrap project
          mkdir -p /tmp/twa-project && cd /tmp/twa-project

          # Generate bubblewrap config
          cat > twa-manifest.json << TWAJSON
          {
            "packageId": "com.titan.${APP_SLUG}",
            "host": "$(echo $APP_URL | python3 -c 'import sys; from urllib.parse import urlparse; u=urlparse(sys.stdin.read().strip()); print(u.netloc)')",
            "name": "${MANIFEST_NAME:-$APP_NAME}",
            "launcherName": "${MANIFEST_SHORT:-$APP_NAME}",
            "display": "standalone",
            "orientation": "default",
            "themeColor": "#${MANIFEST_THEME:-1a1a2e}",
            "navigationColor": "#${MANIFEST_THEME:-1a1a2e}",
            "backgroundColor": "#${MANIFEST_BG:-ffffff}",
            "enableNotifications": ${{ github.event.inputs.enable_notifications == 'true' && 'true' || 'false' }},
            "startUrl": "/",
            "iconUrl": "${ICON_SRC}",
            "maskableIconUrl": "${ICON_SRC}",
            "monochromeIconUrl": "",
            "shortcuts": [],
            "generatorApp": "titan-builder",
            "webManifestUrl": "${MANIFEST_URL}",
            "fallbackType": "customtabs",
            "features": {
              "locationDelegation": {"enabled": ${{ github.event.inputs.enable_location == 'true' && 'true' || 'false' }}},
              "playBilling":        {"enabled": false},
              "arcore":             {"enabled": false}
            },
            "alphaDependencies": {"enabled": false},
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "${APP_URL}",
            "minSdkVersion": 21,
            "signingKey": {
              "path": "./android.keystore",
              "alias": "titan-${APP_SLUG}"
            },
            "splashScreenFadeOutDuration": 300,
            "appVersionName": "1.0.0",
            "appVersionCode": 1
          }
          TWAJSON

          # Copy icon to expected path
          mkdir -p /tmp/twa-project
          cp /tmp/icon.png /tmp/twa-project/icon.png 2>/dev/null || true

          # Generate keystore
          KS_PASS="$(openssl rand -hex 16)"
          KEY_ALIAS="titan-${APP_SLUG}"
          KEY_PASS="$(openssl rand -hex 16)"
          echo "KS_PASS=$KS_PASS"   >> $GITHUB_ENV
          echo "KEY_ALIAS=$KEY_ALIAS" >> $GITHUB_ENV
          echo "KEY_PASS=$KEY_PASS"  >> $GITHUB_ENV

          keytool -genkey -v \
            -keystore /tmp/twa-project/android.keystore \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias "$KEY_ALIAS" \
            -storepass "$KS_PASS" \
            -keypass "$KEY_PASS" \
            -dname "CN=$APP_NAME, OU=App, O=Titan, L=City, S=State, C=US"

          # Init and build via bubblewrap
          cd /tmp/twa-project
          npx @bubblewrap/cli init --manifest="$MANIFEST_URL" --directory=. 2>&1 | tail -20 || true

          # If bubblewrap init fails, use gradle directly
          if [ ! -f "gradlew" ]; then
            echo "⚠️ Bubblewrap init incomplete, using manual TWA setup..."
            git clone --depth=1 https://github.com/GoogleChromeLabs/svgomg-twa.git /tmp/twa-template 2>/dev/null || true
            cp -r /tmp/twa-template/. /tmp/twa-project/ 2>/dev/null || true

            # Patch the TWA template with our values
            find /tmp/twa-project -name "*.gradle" -o -name "*.xml" -o -name "*.json" | while read f; do
              sed -i "s|svgomg.firebaseapp.com|$(echo $APP_URL | python3 -c 'import sys; from urllib.parse import urlparse; u=urlparse(sys.stdin.read().strip()); print(u.netloc)')|g" "$f" 2>/dev/null || true
              sed -i "s|com.chromestatus.svgomg|com.titan.${APP_SLUG}|g" "$f" 2>/dev/null || true
              sed -i "s|SVGOMG|$APP_NAME|g" "$f" 2>/dev/null || true
            done
          fi

          # Build
          chmod +x gradlew 2>/dev/null || true
          ./gradlew assembleRelease 2>&1 | tail -30 || true

          # Sign if APK exists
          APK=$(find /tmp/twa-project -name "*.apk" | head -1)
          if [ -n "$APK" ] && [ -f "$APK" ]; then
            BUILD_TOOLS=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -1)
            $BUILD_TOOLS/apksigner sign \
              --ks /tmp/twa-project/android.keystore \
              --ks-key-alias "$KEY_ALIAS" \
              --ks-pass "pass:$KS_PASS" \
              --key-pass "pass:$KEY_PASS" \
              "$APK" 2>/dev/null || true
            echo "TWA_APK=$APK" >> $GITHUB_ENV
            echo "✅ TWA APK ready: $APK"
          else
            echo "❌ TWA build failed — falling back to WebView"
            echo "BUILD_TYPE=webview" >> $GITHUB_ENV
          fi

          # AAB
          ./gradlew bundleRelease 2>&1 | tail -10 || true
          AAB=$(find /tmp/twa-project -name "*.aab" | head -1)
          [ -n "$AAB" ] && echo "TWA_AAB=$AAB" >> $GITHUB_ENV || true

      # ── Step 2 (WebView): Create Flutter project ───────────────────────────
      - name: Create Flutter WebView project
        if: env.BUILD_TYPE == 'webview' || env.BUILD_TYPE == '' || !env.BUILD_TYPE
        run: |
          APP_SLUG=$(echo "${{ github.event.inputs.app_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/_/g' | sed 's/__*/_/g' | sed 's/^_//;s/_$//')
          echo "APP_SLUG=$APP_SLUG" >> $GITHUB_ENV

          flutter create --platforms=android --project-name "$APP_SLUG" --org com.titan "$APP_SLUG"

          cd "$APP_SLUG"
          # ✅ FIX: أضفنا dio (تحميل HTTPS) — flutter_local_notifications مش محتاجه لأن الـ Kotlin بيعمل الإشعارات native
          flutter pub add flutter_inappwebview connectivity_plus permission_handler url_launcher shared_preferences path_provider device_info_plus just_audio audio_service dio

          # Enable Core Library Desugaring + minSdk
          GRADLE=$(find android/app -maxdepth 1 -name "build.gradle*" | head -1)
          if [ -z "$GRADLE" ]; then
            echo "❌ build.gradle not found!" && exit 1
          fi
          echo "✅ Patching $GRADLE"

          python3 - "$GRADLE" << 'PYEOF'
          import re, sys
          filepath = sys.argv[1]
          content = open(filepath).read()

          content = re.sub(
              r'(compileOptions\s*\{)',
              "\\1\n        isCoreLibraryDesugaringEnabled = true",
              content
          )

          dep_line = 'coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")'
          if re.search(r'^\s*dependencies\s*\{', content, re.MULTILINE):
              content = re.sub(
                  r'(\s*dependencies\s*\{)',
                  "\\1\n    " + dep_line,
                  content, count=1
              )
          else:
              content = content.rstrip() + f"\n\ndependencies {{\n    {dep_line}\n}}\n"

          if 'minSdk' not in content and 'minSdkVersion' not in content:
              content = re.sub(
                  r'(defaultConfig\s*\{)',
                  "\\1\n        minSdk = 21\n        targetSdk = 34",
                  content, count=1
              )

          open(filepath, 'w').write(content)
          print("✅ Gradle patched successfully")
          PYEOF

      # ── Step 3: AndroidManifest permissions & settings ─────────────────────
      - name: Inject Permissions and Manifest Settings
        if: env.BUILD_TYPE == 'webview' || env.BUILD_TYPE == '' || !env.BUILD_TYPE
        env:
          ENABLE_CAMERA: ${{ github.event.inputs.enable_camera }}
          ENABLE_STORAGE: ${{ github.event.inputs.enable_storage }}
          ENABLE_LOCATION: ${{ github.event.inputs.enable_location }}
          ENABLE_NOTIFICATIONS: ${{ github.event.inputs.enable_notifications }}
          APP_NAME: ${{ github.event.inputs.app_name }}
        run: |
          APP_SLUG=${{ env.APP_SLUG }}
          MANIFEST="$APP_SLUG/android/app/src/main/AndroidManifest.xml"

          python3 - "$MANIFEST" << 'PYEOF'
          import sys, os, re
          filepath = sys.argv[1]
          with open(filepath, 'r') as f:
              content = f.read()

          # ✅ FIX: أضفنا الصلاحيات المفقودة للـ overlay وشاشة القفل والإشعارات المجدولة
          permissions = [
              "android.permission.INTERNET",
              "android.permission.ACCESS_NETWORK_STATE",
              "android.permission.ACCESS_WIFI_STATE",
              "android.permission.CHANGE_NETWORK_STATE",
              "android.permission.DOWNLOAD_WITHOUT_NOTIFICATION",
              "android.permission.WAKE_LOCK",
              "android.permission.FOREGROUND_SERVICE",
              "android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK",
              "android.permission.MANAGE_EXTERNAL_STORAGE",
              "android.permission.POST_NOTIFICATIONS",
              "android.permission.VIBRATE",
              "android.permission.RECEIVE_BOOT_COMPLETED",
              "android.permission.SCHEDULE_EXACT_ALARM",
              "android.permission.USE_EXACT_ALARM",
              "android.permission.SYSTEM_ALERT_WINDOW",
              "android.permission.USE_FULL_SCREEN_INTENT",
              "android.permission.DISABLE_KEYGUARD",
          ]

          if os.environ.get("ENABLE_CAMERA") == "true":
              permissions.extend([
                  "android.permission.CAMERA",
                  "android.permission.RECORD_AUDIO",
                  "android.permission.MODIFY_AUDIO_SETTINGS",
              ])
              feature = '<uses-feature android:name="android.hardware.camera" android:required="false"/>'
              if feature not in content:
                  content = content.replace('<application', feature + '\n    <application', 1)

          if os.environ.get("ENABLE_STORAGE") == "true":
              permissions.extend([
                  "android.permission.READ_EXTERNAL_STORAGE",
                  "android.permission.WRITE_EXTERNAL_STORAGE",
                  "android.permission.READ_MEDIA_IMAGES",
                  "android.permission.READ_MEDIA_VIDEO",
                  "android.permission.READ_MEDIA_AUDIO",
              ])

          if os.environ.get("ENABLE_LOCATION") == "true":
              permissions.extend([
                  "android.permission.ACCESS_FINE_LOCATION",
                  "android.permission.ACCESS_COARSE_LOCATION",
              ])

          if os.environ.get("ENABLE_NOTIFICATIONS") == "true":
              permissions.extend([
                  "android.permission.POST_NOTIFICATIONS",
                  "android.permission.VIBRATE",
              ])

          perms_xml = '\n'.join([f'    <uses-permission android:name="{p}"/>' for p in dict.fromkeys(permissions)])

          content = content.replace(
              '<application',
              perms_xml + '\n    <application android:usesCleartextTraffic="true" android:hardwareAccelerated="true" android:largeHeap="true" android:requestLegacyExternalStorage="true"',
              1
          )

          app_name = os.environ.get("APP_NAME", "Flutter App")
          content = content.replace('android:label="flutter_app"', f'android:label="{app_name}"')

          # ✅ FIX: شاشة القفل
          content = re.sub(
              r'(<activity\b(?![^>]*showWhenLocked))',
              r'\1 android:showWhenLocked="true" android:turnScreenOn="true"',
              content, count=1
          )

          # ✅ FIX-KEYBOARD (مُصحَّح): Flutter بيحدد windowSoftInputMode="adjustResize"
          # افتراضيًا في كل مشروع جديد. الكود القديم كان بيتحقق "لو الصفة دي مش موجودة"
          # فيتجاهل الإضافة لأنها أصلاً موجودة بقيمة تانية → الإصلاح ميتفعّلش خالص.
          # دلوقتي بنستبدل القيمة الموجودة فعليًا بـ adjustPan بدل ما نحاول نضيف صفة جديدة.
          if re.search(r'android:windowSoftInputMode="[^"]*"', content):
              content = re.sub(
                  r'android:windowSoftInputMode="[^"]*"',
                  'android:windowSoftInputMode="adjustPan"',
                  content, count=1
              )
          else:
              content = re.sub(
                  r'(<activity\b(?![^>]*windowSoftInputMode))',
                  r'\1 android:windowSoftInputMode="adjustPan"',
                  content, count=1
              )

          # ✅ FIX-PIP (مُصحَّح): كان بيضيف android:configChanges جنب supportsPictureInPicture
          # من غير ما يتأكد إنها موجودة بالفعل. وFlutter بيحدد configChanges افتراضيًا في
          # كل مشروع جديد، فكانت بتتكرر مرتين على نفس الـ <activity> tag — وده duplicate
          # attribute يكسر صحة الـ XML ويوقف ManifestMerger بـ "Error parsing" بالظبط
          # زي اللي حصل. دلوقتي بنفصل الإضافتين، وconfigChanges بس لو مش موجودة أصلاً.
          content = re.sub(
              r'(<activity\b(?![^>]*supportsPictureInPicture))',
              r'\1 android:supportsPictureInPicture="true"',
              content, count=1
          )
          if not re.search(r'<activity\b[^>]*android:configChanges=', content):
              content = re.sub(
                  r'(<activity\b(?![^>]*configChanges))',
                  r'\1 android:configChanges="screenSize|smallestScreenSize|screenLayout|orientation"',
                  content, count=1
              )

          audio_service = '''
                  <service android:name="com.ryanheise.audioservice.AudioService"
                      android:exported="true"
                      android:foregroundServiceType="mediaPlayback">
                      <intent-filter>
                          <action android:name="android.media.browse.MediaBrowserService"/>
                      </intent-filter>
                  </service>
                  <receiver android:name="com.ryanheise.audioservice.MediaButtonReceiver"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MEDIA_BUTTON"/>
                      </intent-filter>
                  </receiver>
          '''
          if 'com.ryanheise.audioservice.AudioService' not in content:
              content = content.replace('</application>', audio_service + '    </application>')

          # ✅ FIX-SHARE: نضيف intent-filter يخلي التطبيق يظهر في قائمة "مشاركة" بتاعة
          # تطبيقات تانية — مطابق لـ share_target.params في manifest.json بتاع الموقع
          # (title/text/url) — استقباله في Kotlin/Dart عبر MethodChannel.
          share_intent_filter = '''
                  <intent-filter>
                      <action android:name="android.intent.action.SEND"/>
                      <category android:name="android.intent.category.DEFAULT"/>
                      <data android:mimeType="text/plain"/>
                  </intent-filter>
          '''
          if 'android.intent.action.SEND' not in content:
              content = content.replace('</activity>', share_intent_filter + '        </activity>', 1)

          provider = '''    <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths"/>
                  </provider>
          '''
          if 'androidx.core.content.FileProvider' not in content:
              content = content.replace('</application>', provider + '</application>')

          with open(filepath, 'w') as f:
              f.write(content)
          print("✅ Manifest patched")
          PYEOF

          # file_paths.xml
          mkdir -p "$APP_SLUG/android/app/src/main/res/xml"
          cat > "$APP_SLUG/android/app/src/main/res/xml/file_paths.xml" << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <root-path name="root" path="."/>
              <external-path name="external_files" path="."/>
              <external-cache-path name="external_cache" path="."/>
              <files-path name="internal_files" path="."/>
              <cache-path name="cache" path="."/>
              <external-files-path name="external_app_files" path="."/>
          </paths>
          XML

      # ── Step 4: Write main.dart (part 1/2) ─────────────────────────────────
      - name: Write main.dart part 1 (imports, VideoServer, AudioHandler, handlers)
        if: env.BUILD_TYPE == 'webview' || env.BUILD_TYPE == '' || !env.BUILD_TYPE
        env:
          APP_SLUG: ${{ env.APP_SLUG }}
        run: |
          mkdir -p "$APP_SLUG/lib"
          cat > "$APP_SLUG/lib/main.dart" << 'DART'
          import 'dart:io';
          import 'dart:convert';
          import 'package:path_provider/path_provider.dart';
          import 'package:flutter/material.dart';
          import 'package:flutter/services.dart';
          import 'package:flutter_inappwebview/flutter_inappwebview.dart';
          import 'package:connectivity_plus/connectivity_plus.dart';
          import 'package:permission_handler/permission_handler.dart';
          import 'package:url_launcher/url_launcher.dart';
          import 'package:shared_preferences/shared_preferences.dart';
          import 'package:device_info_plus/device_info_plus.dart';
          import 'package:audio_service/audio_service.dart';
          import 'package:just_audio/just_audio.dart';
          import 'package:dio/dio.dart';

          const String kAppUrl  = 'PLACEHOLDER_URL';
          const String kAppName = 'PLACEHOLDER_NAME';
          const bool   kEnableLocation      = PLACEHOLDER_LOCATION;
          const bool   kEnableNotifications = PLACEHOLDER_NOTIFICATIONS;
          const bool   kEnableCamera        = PLACEHOLDER_CAMERA;
          const bool   kEnableStorage       = PLACEHOLDER_STORAGE;

          const String kUserAgent =
            'Mozilla/5.0 (Linux; Android 14; Pixel 8 Pro Build/UQ1A.240105.004) '
            'AppleWebKit/537.36 (KHTML, like Gecko) '
            'Chrome/124.0.6367.82 Mobile Safari/537.36';

          String _guessMime(String name) {
            final ext = name.toLowerCase().split('.').last;
            switch (ext) {
              case 'jpg': case 'jpeg': return 'image/jpeg';
              case 'png':  return 'image/png';
              case 'gif':  return 'image/gif';
              case 'webp': return 'image/webp';
              case 'mp4': case 'm4v': return 'video/mp4';
              case 'webm': return 'video/webm';
              case 'mkv':  return 'video/x-matroska';
              case 'mp3':  return 'audio/mpeg';
              case 'aac':  return 'audio/aac';
              case 'ogg':  return 'audio/ogg';
              case 'pdf':  return 'application/pdf';
              case 'zip':  return 'application/zip';
              case 'apk':  return 'application/vnd.android.package-archive';
              default:     return 'application/octet-stream';
            }
          }

          // ═══════════════════════════════════════════════════════════════════
          // Local HTTP server — streams device video files with byte-range
          // support so the HTML5 <video> element can seek properly.
          // ═══════════════════════════════════════════════════════════════════
          class _TitanVideoServer {
            static HttpServer? _srv;
            static int _port = 0;

            static Future<void> start() async {
              if (_srv != null) return;
              _srv = await HttpServer.bind(InternetAddress.loopbackIPv4, 0);
              _port = _srv!.port;
              _srv!.listen(_handle, onError: (_) {});
            }

            static Future<void> _handle(HttpRequest req) async {
              try {
                req.response.headers.set('Access-Control-Allow-Origin', '*');
                req.response.headers.set('Access-Control-Allow-Headers', 'Range');
                req.response.headers.set('Access-Control-Expose-Headers', 'Content-Range, Accept-Ranges');
                if (req.method == 'OPTIONS') {
                  req.response.statusCode = 204;
                  await req.response.close();
                  return;
                }
                final filePath = Uri.decodeComponent(req.requestedUri.path.substring(1));
                final file = File(filePath);
                if (!await file.exists()) {
                  req.response.statusCode = 404;
                  await req.response.close();
                  return;
                }
                final len  = await file.length();
                final mime = _mime(filePath);
                req.response.headers.set('Content-Type', mime);
                req.response.headers.set('Accept-Ranges', 'bytes');
                final range = req.headers.value('range');
                if (range != null) {
                  final m = RegExp(r'bytes=(\d*)-(\d*)').firstMatch(range);
                  final s = (m?.group(1)?.isNotEmpty == true) ? int.parse(m!.group(1)!) : 0;
                  final e = (m?.group(2)?.isNotEmpty == true) ? int.parse(m!.group(2)!) : len - 1;
                  req.response.statusCode = 206;
                  req.response.headers.set('Content-Range', 'bytes $s-$e/$len');
                  req.response.headers.contentLength = e - s + 1;
                  await req.response.addStream(file.openRead(s, e + 1));
                } else {
                  req.response.statusCode = 200;
                  req.response.headers.contentLength = len;
                  await req.response.addStream(file.openRead());
                }
              } catch (_) {
                try { req.response.statusCode = 500; } catch (_) {}
              }
              try { await req.response.close(); } catch (_) {}
            }

            static String _mime(String p) {
              if (p.endsWith('.mp4') || p.endsWith('.m4v')) return 'video/mp4';
              if (p.endsWith('.mkv'))  return 'video/x-matroska';
              if (p.endsWith('.avi'))  return 'video/x-msvideo';
              if (p.endsWith('.mov'))  return 'video/quicktime';
              if (p.endsWith('.webm')) return 'video/webm';
              if (p.endsWith('.3gp'))  return 'video/3gpp';
              return 'video/mp4';
            }

            // ✅ FIX: أزلنا \$ اللي كان بيعطل الـ interpolation في single-quoted heredoc
            static String urlFor(String filePath) =>
                'http://127.0.0.1:$_port/${Uri.encodeComponent(filePath)}';
          }

          class TitanAudioHandler extends BaseAudioHandler with QueueHandler, SeekHandler {
            // ✅ FIX-BRIDGE: callback يتصل بالـ WebView عشان نتحكم في الميديا من الإشعار
            // يُضبط في onWebViewCreated ويُصفَّر عند dispose
            Function(String)? _evalJS;
            void attachEval(Function(String) fn) => _evalJS = fn;
            void detachEval()                    => _evalJS = null;

            // ✅ FIX-BRIDGE: play/pause من الإشعار يؤثر فعلياً على الـ WebView
            @override
            Future<void> play() async {
              _evalJS?.call(
                'document.querySelectorAll("video,audio")'
                '.forEach(function(m){m.play().catch(function(){});});'
              );
              updatePlaybackState(true);
            }

            @override
            Future<void> pause() async {
              _evalJS?.call(
                'document.querySelectorAll("video,audio")'
                '.forEach(function(m){m.pause();});'
              );
              updatePlaybackState(false);
            }

            @override
            Future<void> stop() async {
              _evalJS?.call(
                'document.querySelectorAll("video,audio")'
                '.forEach(function(m){m.pause();m.currentTime=0;});'
              );
              playbackState.add(playbackState.value.copyWith(
                playing: false,
                processingState: AudioProcessingState.idle,
                controls: [],
              ));
            }

            // ✅ FIX-BRIDGE: seek من شريط الإشعار يحرك الميديا في الـ WebView
            @override
            Future<void> seek(Duration position) async {
              final secs = position.inMilliseconds / 1000.0;
              _evalJS?.call(
                'document.querySelectorAll("video,audio")'
                '.forEach(function(m){m.currentTime=$secs;});'
              );
            }

            @override Future<void> skipToNext()     async {}
            @override Future<void> skipToPrevious() async {}

            void setNowPlaying(String title, String artUrl, {
              double duration = 0, double position = 0,
            }) {
              Uri? art;
              if (artUrl.isNotEmpty) { try { art = Uri.parse(artUrl); } catch (_) {} }

              // ✅ FIX-ID: ID ثابت مبني على العنوان — بدل UUID جديد كل مرة
              // كان UUID الجديد بيخلي audio_service يعامله كمقطع جديد ويعيد تهيئة الإشعار
              final stableId = 'titan:${title.hashCode}';

              mediaItem.add(MediaItem(
                id:       stableId,
                title:    title.isNotEmpty ? title : kAppName,
                album:    kAppName,
                artUri:   art,
                playable: true,
                duration: duration > 0
                    ? Duration(milliseconds: (duration * 1000).toInt())
                    : null,
              ));

              if (playbackState.value.processingState == AudioProcessingState.idle) {
                updatePlaybackState(true);
              }
            }

            void updatePlaybackState(bool playing, {double position = 0, double duration = 0}) {
              playbackState.add(playbackState.value.copyWith(
                playing:  playing,
                // ✅ FIX-CONTROLS: 3 أزرار في الإشعار بدل زر واحد
                controls: [
                  MediaControl.skipToPrevious,
                  playing ? MediaControl.pause : MediaControl.play,
                  MediaControl.skipToNext,
                ],
                systemActions: const {
                  MediaAction.play, MediaAction.pause, MediaAction.stop,
                  MediaAction.seek, MediaAction.seekForward, MediaAction.seekBackward,
                },
                // ✅ FIX-COMPACT: الأزرار الثلاثة تظهر في الإشعار المصغر
                androidCompactActionIndices: const [0, 1, 2],
                processingState: AudioProcessingState.ready,
                updatePosition: Duration(milliseconds: (position * 1000).toInt()),
                bufferedPosition: duration > 0
                    ? Duration(milliseconds: (duration * 1000).toInt())
                    : Duration.zero,
              ));
            }
          }

          TitanAudioHandler? _audioHandler;

          void main() async {
            WidgetsFlutterBinding.ensureInitialized();

            try {
              _audioHandler = await AudioService.init(
                builder: () => TitanAudioHandler(),
                config: const AudioServiceConfig(
                  androidNotificationChannelId:   'com.titan.webview.media',
                  androidNotificationChannelName: 'Titan Media',
                  androidNotificationIcon:        'mipmap/ic_launcher',
                  androidShowNotificationBadge:   true,
                  // ✅ FIX-LOCKSCREEN: true = الإشعار لا يُمسح → يفضل على شاشة القفل
                  androidNotificationOngoing:     true,
                  // ✅ FIX-LOCKSCREEN: false = الفورجراوند سيرفس مش يوقف لما تعمل pause
                  // كان true = لما تضغط pause يوقف السيرفس → يختفي من شاشة القفل
                  androidStopForegroundOnPause:   false,
                  notificationColor:              Color(0xFF7c3aed),
                ),
              );
            } catch (e) { debugPrint('AudioService init skipped: $e'); }

            await _TitanVideoServer.start();

            SystemChrome.setEnabledSystemUIMode(SystemUiMode.edgeToEdge);
            SystemChrome.setPreferredOrientations([
              DeviceOrientation.portraitUp, DeviceOrientation.portraitDown,
              DeviceOrientation.landscapeLeft, DeviceOrientation.landscapeRight,
            ]);
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) => MaterialApp(
              title: kAppName, debugShowCheckedModeBanner: false,
              theme: ThemeData(useMaterial3: true, colorScheme: ColorScheme.fromSeed(seedColor: Colors.blue)),
              home: const WebViewPage(),
            );
          }

          class WebViewPage extends StatefulWidget {
            const WebViewPage({super.key});
            @override State<WebViewPage> createState() => _WebViewPageState();
          }

          class _WebViewPageState extends State<WebViewPage> with WidgetsBindingObserver {
            InAppWebViewController? _ctrl;
            bool _loading       = true;
            bool _offline       = false;
            bool _error         = false;
            bool _fullscreen    = false;
            bool _hasLoadedOnce = false;

            @override
            void initState() {
              super.initState();
              WidgetsBinding.instance.addObserver(this);
              _requestPermissions();
              _checkConnectivity();
              _setupShareHandling(); // ✅ FIX-SHARE: استقبال مشاركات من تطبيقات تانية
              Connectivity().onConnectivityChanged.listen((r) {
                if (!mounted) return;
                final wasOffline = _offline;
                setState(() => _offline = r.contains(ConnectivityResult.none));
                if (wasOffline && !_offline && _error) _ctrl?.reload();
              });
            }

            // ✅ FIX-SHARE: حالتين — (تشغيل دافئ) Kotlin يبعت مباشرة عبر setMethodCallHandler
            // و(تشغيل بارد) بنسحب البيانات يدوياً مرة واحدة بعد فتح التطبيق
            void _setupShareHandling() {
              const ch = MethodChannel('titan_download');
              ch.setMethodCallHandler((call) async {
                if (call.method == 'onSharedContent' && call.arguments is Map) {
                  _navigateWithShareData(Map<String, dynamic>.from(call.arguments as Map));
                }
                return null;
              });
              Future.delayed(const Duration(milliseconds: 100), () async {
                try {
                  final data = await ch.invokeMethod<Map>('getPendingShare');
                  if (data != null) {
                    _navigateWithShareData(Map<String, dynamic>.from(data));
                  }
                } catch (_) {}
              });
            }

            // ✅ FIX-SHARE: نبني رابط بنفس معايير share_target.params اللي معلنها الموقع
            // (title/text/url) وننقل الـ WebView له بعد أول تحميل
            void _navigateWithShareData(Map<String, dynamic> data) {
              final title = Uri.encodeQueryComponent((data['title'] ?? '').toString());
              final text  = Uri.encodeQueryComponent((data['text']  ?? '').toString());
              final url   = Uri.encodeQueryComponent((data['url']   ?? '').toString());
              if (title.isEmpty && text.isEmpty && url.isEmpty) return;
              final sep    = kAppUrl.contains('?') ? '&' : '?';
              final target = '$kAppUrl$sep' 'title=$title&text=$text&url=$url';
              Future.delayed(const Duration(milliseconds: 300), () {
                _ctrl?.loadUrl(urlRequest: URLRequest(url: WebUri(target)));
              });
            }

            // ✅ FIX: أزلنا \$ عشان يشتغل Dart string interpolation صح — كان بيعمل مسار غلط
            Future<String> _writeTempFile(List<int> bytes, String name) async {
              final dir  = await getTemporaryDirectory();
              final file = File('${dir.path}/$name');
              await file.writeAsBytes(bytes, flush: true);
              return file.path;
            }

            void _setupMediaBridge(InAppWebViewController ctrl) {
              ctrl.addJavaScriptHandler(
                handlerName: 'titanMediaUpdate',
                callback: (args) {
                  if (args.isEmpty) return;
                  try {
                    final data        = args[0] as Map<String, dynamic>;
                    final playing     = data['playing']     as bool?   ?? false;
                    final rawTitle    = data['title']       as String? ?? '';
                    final artUrl      = data['artUrl']      as String? ?? '';
                    final duration    = (data['duration']   as num?    ?? 0).toDouble();
                    final currentTime = (data['currentTime'] as num?   ?? 0).toDouble();

                    _audioHandler?.setNowPlaying(
                      rawTitle.isNotEmpty ? rawTitle : kAppName,
                      artUrl,
                      duration: duration,
                      position: currentTime,
                    );
                    _audioHandler?.updatePlaybackState(
                      playing,
                      position: currentTime,
                      duration: duration,
                    );
                  } catch (_) {}
                },
              );

              ctrl.addJavaScriptHandler(
                handlerName: 'saveToGallery',
                callback: (args) async {
                  if (args.isEmpty) return 'error';
                  try {
                    final data     = args[0] as Map<String, dynamic>;
                    final b64      = data['data']     as String? ?? '';
                    // ✅ FIX: أزلنا \$ عشان يشتغل Dart string interpolation صح
                    final fileName = data['fileName'] as String?
                        ?? 'Titan_${DateTime.now().millisecondsSinceEpoch}.jpg';
                    if (b64.isEmpty) return 'error';
                    final raw   = b64.contains(',') ? b64.split(',').last : b64;
                    final bytes = base64Decode(raw);
                    final tmp   = await _writeTempFile(bytes, fileName);
                    const ch    = MethodChannel('titan_download');
                    return await ch.invokeMethod<String>('saveToDownloads', {
                      'sourcePath': tmp, 'fileName': fileName, 'mimeType': _guessMime(fileName)}) ?? 'error';
                  } catch (e) { debugPrint('saveToGallery: $e'); return 'error'; }
                },
              );

              ctrl.addJavaScriptHandler(
                handlerName: 'saveFileBytes',
                callback: (args) async {
                  if (args.isEmpty) return 'error';
                  try {
                    final data     = args[0] as Map<String, dynamic>;
                    final b64      = data['data']     as String? ?? '';
                    // ✅ FIX: أزلنا \$ عشان يشتغل Dart string interpolation صح
                    final fileName = data['fileName'] as String?
                        ?? 'Titan_${DateTime.now().millisecondsSinceEpoch}';
                    final mimeType = data['mimeType'] as String? ?? _guessMime(fileName);
                    if (b64.isEmpty) return 'error';
                    final raw   = b64.contains(',') ? b64.split(',').last : b64;
                    final bytes = base64Decode(raw);
                    final tmp   = await _writeTempFile(bytes, fileName);
                    const ch    = MethodChannel('titan_download');
                    final ok    = await ch.invokeMethod<String>('saveToDownloads', {
                      'sourcePath': tmp, 'fileName': fileName,
                      'mimeType':   mimeType.isEmpty ? _guessMime(fileName) : mimeType});
                    if (mounted) {
                      ScaffoldMessenger.of(context).showSnackBar(SnackBar(
                        content: Text(ok == 'saved'
                            ? '✅ تم الحفظ: $fileName'
                            : '❌ فشل الحفظ'),
                        duration: const Duration(seconds: 3)));
                    }
                    return ok ?? 'error';
                  } catch (e) {
                    if (mounted) ScaffoldMessenger.of(context).showSnackBar(
                        const SnackBar(content: Text('❌ تعذّر حفظ الملف')));
                    debugPrint('saveFileBytes: $e'); return 'error';
                  }
                },
              );

              // ✅ FIX: كان intentional no-op — دلوقتي بيبعت للـ Kotlin عشان يعرض الإشعار فعلياً
              ctrl.addJavaScriptHandler(
                handlerName: 'showNotification',
                callback: (args) async {
                  if (args.isEmpty) return;
                  try {
                    final data  = args[0] as Map<String, dynamic>;
                    final title = data['title'] as String? ?? kAppName;
                    final body  = data['body']  as String? ?? '';
                    const ch = MethodChannel('titan_download');
                    await ch.invokeMethod('showNotification', {'title': title, 'body': body});
                  } catch (e) { debugPrint('showNotification: $e'); }
                },
              );

              // ✅ FIX-PIP: handler يستقبل طلب PiP من JS → يبعته للـ Kotlin Activity
              ctrl.addJavaScriptHandler(
                handlerName: 'enterPiP',
                callback: (args) async {
                  try {
                    const ch = MethodChannel('titan_download');
                    return await ch.invokeMethod<String>('enterPiP') ?? 'failed';
                  } catch (e) {
                    debugPrint('enterPiP: $e');
                    return 'not_supported';
                  }
                },
              );

              // Cinema: file paths → localhost streaming URLs
              ctrl.addJavaScriptHandler(
                handlerName: 'getNativeVideos',
                callback: (args) async {
                  try {
                    final sdkInt = await _getSdkInt();
                    bool granted = sdkInt >= 33
                        ? (await Permission.videos.request()).isGranted
                        : (await Permission.storage.request()).isGranted;
                    if (!granted) return <Map>[];
                    const ch  = MethodChannel('titan_download');
                    final raw = await ch.invokeMethod<List>('getDeviceVideos');
                    if (raw == null || raw.isEmpty) return <Map>[];
                    final videos = <Map<String, dynamic>>[];
                    for (final item in raw) {
                      final v        = Map<String, dynamic>.from(item as Map);
                      final filePath = v['filePath'] as String? ?? '';
                      if (filePath.isEmpty) continue;
                      videos.add({
                        'url':       _TitanVideoServer.urlFor(filePath),
                        'title':     v['title']     ?? '',
                        'duration':  v['duration']  ?? 0,
                        'thumbnail': v['thumbnail'] ?? '',
                      });
                    }
                    return videos;
                  } catch (e) { debugPrint('getNativeVideos: $e'); return <Map>[]; }
                },
              );

              // ✅ FIX-BRIDGE: نربط الـ evalJS بالـ audioHandler عشان الإشعار يتحكم في الـ WebView
              _audioHandler?.attachEval((js) => ctrl.evaluateJavascript(source: js));

              ctrl.evaluateJavascript(source: r"""
                (function() {
                  // ✅ FIX-CAPACITOR: الموقع بيفحص window.Capacitor.isNative عشان يقرر
                  // يحفظ الملف عن طريق Capacitor.Plugins.Filesystem ولا fallback عادي.
                  // إحنا مش تطبيق Capacitor، فـ window.Capacitor كانت undefined →
                  // الموقع يدخل في الـ fallback (anchor.click() على عنصر منفصل عن الصفحة)
                  // وده مش بيوصل لحدث click على document فعملنا polyfill بسيط يوصّل
                  // مباشرة لقناة الحفظ الأصلية بتاعتنا (نفس اللي اتأكد إنها شغالة).
                  window.Capacitor = window.Capacitor || {
                    isNative: true,
                    getPlatform: function() { return 'android'; },
                    Plugins: {
                      Filesystem: {
                        writeFile: function(opts) {
                          return new Promise(function(resolve, reject) {
                            if (!window.flutter_inappwebview) { reject('no_bridge'); return; }
                            var path = (opts && opts.path) || 'file';
                            var name = path.split('/').pop();
                            window.flutter_inappwebview.callHandler('saveFileBytes', {
                              data: opts.data, fileName: name, mimeType: ''
                            }).then(function(res) {
                              if (res === 'saved') resolve({ uri: 'file://' + name });
                              else reject(res || 'save_failed');
                            }).catch(reject);
                          });
                        }
                      }
                    }
                  };

                  if (window._tMediaBridgeReady) return; // منع التكرار عند كل onLoadStop
                  window._tMediaBridgeReady = true;

                  // ── 1. Media bridge ──────────────────────────────────────
                  // ✅ FIX-TITLE: بيحاول مصادر متعددة بترتيب أولوية
                  function _getTitle() {
                    // ① عنصر مخصص من TitanMediaCore
                    var tc = document.getElementById('tc-media-title');
                    if (tc && tc.innerText.trim()) return tc.innerText.trim();
                    // ② og:title أو twitter:title
                    var ogT = document.querySelector('meta[property="og:title"]') ||
                              document.querySelector('meta[name="twitter:title"]');
                    if (ogT && ogT.getAttribute('content')) return ogT.getAttribute('content');
                    // ③ عنوان الصفحة
                    return document.title || 'Titan Media';
                  }

                  // ✅ FIX-ART: بيجرب 6 مصادر للصورة قبل ما يستسلم
                  function _getArtUrl() {
                    // ① og:image
                    var og = document.querySelector('meta[property="og:image"]');
                    if (og && og.getAttribute('content')) return og.getAttribute('content');
                    // ② twitter:image
                    var tw = document.querySelector('meta[name="twitter:image"]') ||
                             document.querySelector('meta[name="twitter:image:src"]');
                    if (tw && tw.getAttribute('content')) return tw.getAttribute('content');
                    // ③ apple-touch-icon (high-res)
                    var ap = document.querySelector('link[rel="apple-touch-icon"][href]') ||
                             document.querySelector('link[rel="apple-touch-icon-precomposed"][href]');
                    if (ap && ap.href) return ap.href;
                    // ④ أكبر favicon
                    var fav = document.querySelector('link[rel="icon"][sizes="192x192"]') ||
                              document.querySelector('link[rel="icon"][sizes="128x128"]') ||
                              document.querySelector('link[rel~="icon"]');
                    if (fav && fav.href) return fav.href;
                    // ⑤ لو في فيديو، جرب poster
                    var vid = document.querySelector('video[poster]');
                    if (vid && vid.poster) return vid.poster;
                    // ⑥ أقرب صورة لعنصر audio
                    var aud = document.querySelector('audio');
                    if (aud) {
                      var img = aud.closest('[class*="player"],[class*="Player"],'
                        + '[id*="player"],[id*="Player"]')
                        || aud.parentElement || aud.parentElement;
                      if (img) {
                        var i = img.querySelector('img[src]');
                        if (i && i.src) return i.src;
                      }
                    }
                    return '';
                  }

                  // ✅ FIX-THROTTLE: timeupdate بيتنشر كتير جداً — نخفف لمرة كل ثانية
                  var _lastNotify = 0;
                  function _notify(el, force) {
                    if (!el || !window.flutter_inappwebview) return;
                    var now = Date.now();
                    if (!force && now - _lastNotify < 1000) return; // throttle 1s
                    _lastNotify = now;
                    window.flutter_inappwebview.callHandler('titanMediaUpdate', {
                      playing:     !el.paused,
                      title:       _getTitle(),
                      artUrl:      _getArtUrl(),
                      // ✅ FIX-SCRUBBER: نبعت position و duration عشان شريط التقديم يشتغل
                      duration:    isFinite(el.duration) ? el.duration : 0,
                      currentTime: el.currentTime || 0,
                    });
                  }

                  function _attach(el) {
                    if (el._tBridged) return; el._tBridged = true;
                    // play/pause/ended — force notify فوراً
                    ['play','pause','ended'].forEach(function(ev) {
                      el.addEventListener(ev, function() { _notify(el, true); });
                    });
                    // ✅ FIX-POSITION: timeupdate بيحدّث الـ scrubber في الإشعار كل ثانية
                    el.addEventListener('timeupdate', function() { _notify(el, false); });
                    // ✅ FIX-ART: لو الـ metadata وصلت بعدين (كتير بيحصل في audio streams)
                    el.addEventListener('loadedmetadata', function() { _notify(el, true); });
                  }

                  document.querySelectorAll('video,audio').forEach(_attach);
                  if (!window._tMO) {
                    window._tMO = new MutationObserver(function(ms) {
                      ms.forEach(function(m) {
                        m.addedNodes.forEach(function(n) {
                          if (n.tagName==='VIDEO'||n.tagName==='AUDIO') _attach(n);
                          if (n.querySelectorAll) n.querySelectorAll('video,audio').forEach(_attach);
                        });
                      });
                    });
                    window._tMO.observe(document.documentElement, {childList:true,subtree:true});
                  }
                  // ✅ FIX-SPA: polling أسرع عشان المواقع الـ SPA اللي تضيف الميديا بعدين
                  if (!window._tPoll) {
                    window._tPoll = setInterval(function() {
                      document.querySelectorAll('video,audio').forEach(_attach);
                    }, 1500);
                  }
                  // ── 2. Blob download interceptor ─────────────────────────
                  if (!window._tBlobDl && window.flutter_inappwebview) {
                    window._tBlobDl = true;
                    document.addEventListener('click', function(e) {
                      var a = e.target;
                      for (var i=0; i<6 && a; i++) {
                        if (a.tagName==='A') break; a=a.parentElement;
                      }
                      if (!a||a.tagName!=='A'||!a.hasAttribute('download')) return;
                      var href = a.getAttribute('href')||'';
                      if (!href.startsWith('blob:')) return;
                      e.preventDefault(); e.stopPropagation();
                      var fname = a.getAttribute('download')||'download';
                      fetch(href).then(function(r){return r.blob();})
                        .then(function(b){return new Promise(function(res,rej){
                          var fr=new FileReader();
                          fr.onload=function(){res(fr.result);}; fr.onerror=rej;
                          fr.readAsDataURL(b);});})
                        .then(function(d){
                          window.flutter_inappwebview.callHandler('saveFileBytes',
                            {data:d,fileName:fname,mimeType:''});})
                        .catch(function(err){console.warn('[Titan] blob DL:',err);});
                    }, true);
                  }
                  // ── 3. Web Notification API override ─────────────────────
                  if (!window._tNotifDone) {
                    window._tNotifDone = true;
                    function TitanNotif(title, opts) {
                      if (window.flutter_inappwebview) {
                        window.flutter_inappwebview.callHandler('showNotification', {
                          title: String(title||''),
                          body:  String((opts&&opts.body)||''),
                          icon:  String((opts&&opts.icon)||''),
                          tag:   String((opts&&opts.tag)||'')}
                        ).catch(function(){});
                      }
                      this.close=function(){}; this.onclick=null;
                    }
                    TitanNotif.permission='granted';
                    TitanNotif.requestPermission=function(cb){
                      var p=Promise.resolve('granted'); if(cb) p.then(cb); return p;};
                    try { Object.defineProperty(window,'Notification',
                      {value:TitanNotif,writable:true,configurable:true}); } catch(e){}
                  }
                })();
              """);
            }
