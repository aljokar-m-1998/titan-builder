                  // مباشرة لقناة الحفظ الأصلية بتاعتنا (نفس اللي اتأكد إنها شغالة).
                  window.Capacitor = window.Capacitor || {
                    isNative: true,
                    getPlatform: function() { return 'android'; },
                    Plugins: {
                      Filesystem: {
                        writeFile: function(opts) {
                          return new Promise(function(resolve, reject) {
                            if (!window.flutter_inappwebview) { reject('no_bridge'); return; }
                            var path = (opts && opts.path) || 'file';
                            var name = path.split('/').pop();
                            window.flutter_inappwebview.callHandler('saveFileBytes', {
                              data: opts.data, fileName: name, mimeType: ''
                            }).then(function(res) {
                              if (res === 'saved') resolve({ uri: 'file://' + name });
                              else reject(res || 'save_failed');
                            }).catch(reject);
                          });
                        }
                      }
                    }
                  };

                  if (window._tMediaBridgeReady) return; // منع التكرار عند كل onLoadStop
                  window._tMediaBridgeReady = true;

                  // ── 1. Media bridge ──────────────────────────────────────
                  // ✅ FIX-TITLE: بيحاول مصادر متعددة بترتيب أولوية
                  function _getTitle() {
                    // ① عنصر مخصص من TitanMediaCore
                    var tc = document.getElementById('tc-media-title');
                    if (tc && tc.innerText.trim()) return tc.innerText.trim();
                    // ② og:title أو twitter:title
                    var ogT = document.querySelector('meta[property="og:title"]') ||
                              document.querySelector('meta[name="twitter:title"]');
                    if (ogT && ogT.getAttribute('content')) return ogT.getAttribute('content');
                    // ③ عنوان الصفحة
                    return document.title || 'Titan Media';
                  }

                  // ✅ FIX-ART: بيجرب 6 مصادر للصورة قبل ما يستسلم
                  function _getArtUrl() {
                    // ① og:image
                    var og = document.querySelector('meta[property="og:image"]');
                    if (og && og.getAttribute('content')) return og.getAttribute('content');
                    // ② twitter:image
                    var tw = document.querySelector('meta[name="twitter:image"]') ||
                             document.querySelector('meta[name="twitter:image:src"]');
                    if (tw && tw.getAttribute('content')) return tw.getAttribute('content');
                    // ③ apple-touch-icon (high-res)
                    var ap = document.querySelector('link[rel="apple-touch-icon"][href]') ||
                             document.querySelector('link[rel="apple-touch-icon-precomposed"][href]');
                    if (ap && ap.href) return ap.href;
                    // ④ أكبر favicon
                    var fav = document.querySelector('link[rel="icon"][sizes="192x192"]') ||
                              document.querySelector('link[rel="icon"][sizes="128x128"]') ||
                              document.querySelector('link[rel~="icon"]');
                    if (fav && fav.href) return fav.href;
                    // ⑤ لو في فيديو، جرب poster
                    var vid = document.querySelector('video[poster]');
                    if (vid && vid.poster) return vid.poster;
                    // ⑥ أقرب صورة لعنصر audio
                    var aud = document.querySelector('audio');
                    if (aud) {
                      var img = aud.closest('[class*="player"],[class*="Player"],'
                        + '[id*="player"],[id*="Player"]')
                        || aud.parentElement || aud.parentElement;
                      if (img) {
                        var i = img.querySelector('img[src]');
                        if (i && i.src) return i.src;
                      }
                    }
                    return '';
                  }

                  // ✅ FIX-THROTTLE: timeupdate بيتنشر كتير جداً — نخفف لمرة كل ثانية
                  var _lastNotify = 0;
                  function _notify(el, force) {
                    if (!el || !window.flutter_inappwebview) return;
                    var now = Date.now();
                    if (!force && now - _lastNotify < 1000) return; // throttle 1s
                    _lastNotify = now;
                    window.flutter_inappwebview.callHandler('titanMediaUpdate', {
                      playing:     !el.paused,
                      title:       _getTitle(),
                      artUrl:      _getArtUrl(),
                      // ✅ FIX-SCRUBBER: نبعت position و duration عشان شريط التقديم يشتغل
                      duration:    isFinite(el.duration) ? el.duration : 0,
                      currentTime: el.currentTime || 0,
                    });
                  }

                  function _attach(el) {
                    if (el._tBridged) return; el._tBridged = true;
                    // play/pause/ended — force notify فوراً
                    ['play','pause','ended'].forEach(function(ev) {
                      el.addEventListener(ev, function() { _notify(el, true); });
                    });
                    // ✅ FIX-POSITION: timeupdate بيحدّث الـ scrubber في الإشعار كل ثانية
                    el.addEventListener('timeupdate', function() { _notify(el, false); });
                    // ✅ FIX-ART: لو الـ metadata وصلت بعدين (كتير بيحصل في audio streams)
                    el.addEventListener('loadedmetadata', function() { _notify(el, true); });
                  }

                  // ✅ FIX-DETACHED-AUDIO: مواقع كتير بتعمل مشغّل صوت مخصص بالكود
                  // new Audio(blobUrl) — وده عنصر في الذاكرة بس، مش متصل بالصفحة
                  // خالص، فـ querySelectorAll وMutationObserver مايلاقوهوش أبداً.
                  // الحل: نعترض الـ constructor العالمي بتاع Audio نفسه، فأي new Audio()
                  // في أي موقع يتلقط لحظة إنشائه — قبل ما نعرف هيتحط في الصفحة ولا مش هيتحط.
                  if (!window._tAudioCtorPatched && typeof window.Audio === 'function') {
                    window._tAudioCtorPatched = true;
                    var _NativeAudio = window.Audio;
                    var _TitanAudio = function(src) {
                      var el = (src !== undefined) ? new _NativeAudio(src) : new _NativeAudio();
                      _attach(el);
                      return el;
                    };
                    _TitanAudio.prototype = _NativeAudio.prototype;
                    window.Audio = _TitanAudio;
                  }

                  document.querySelectorAll('video,audio').forEach(_attach);
                  if (!window._tMO) {
                    window._tMO = new MutationObserver(function(ms) {
                      ms.forEach(function(m) {
                        m.addedNodes.forEach(function(n) {
                          if (n.tagName==='VIDEO'||n.tagName==='AUDIO') _attach(n);
                          if (n.querySelectorAll) n.querySelectorAll('video,audio').forEach(_attach);
                        });
                      });
                    });
                    window._tMO.observe(document.documentElement, {childList:true,subtree:true});
                  }
                  // ✅ FIX-SPA: polling أسرع عشان المواقع الـ SPA اللي تضيف الميديا بعدين
                  if (!window._tPoll) {
                    window._tPoll = setInterval(function() {
                      document.querySelectorAll('video,audio').forEach(_attach);
                    }, 1500);
                  }
                  // ── 2. Blob download interceptor ─────────────────────────
                  if (!window._tBlobDl && window.flutter_inappwebview) {
                    window._tBlobDl = true;
                    document.addEventListener('click', function(e) {
                      var a = e.target;
                      for (var i=0; i<6 && a; i++) {
                        if (a.tagName==='A') break; a=a.parentElement;
                      }
                      if (!a||a.tagName!=='A'||!a.hasAttribute('download')) return;
                      var href = a.getAttribute('href')||'';
                      if (!href.startsWith('blob:')) return;
                      e.preventDefault(); e.stopPropagation();
                      var fname = a.getAttribute('download')||'download';
                      fetch(href).then(function(r){return r.blob();})
                        .then(function(b){return new Promise(function(res,rej){
                          var fr=new FileReader();
                          fr.onload=function(){res(fr.result);}; fr.onerror=rej;
                          fr.readAsDataURL(b);});})
                        .then(function(d){
                          window.flutter_inappwebview.callHandler('saveFileBytes',
                            {data:d,fileName:fname,mimeType:''});})
                        .catch(function(err){console.warn('[Titan] blob DL:',err);});
                    }, true);
                  }
                  // ── 3. Web Notification API override ─────────────────────
                  if (!window._tNotifDone) {
                    window._tNotifDone = true;
                    function TitanNotif(title, opts) {
                      if (window.flutter_inappwebview) {
                        window.flutter_inappwebview.callHandler('showNotification', {
                          title: String(title||''),
                          body:  String((opts&&opts.body)||''),
                          icon:  String((opts&&opts.icon)||''),
                          tag:   String((opts&&opts.tag)||'')}
                        ).catch(function(){});
                      }
                      this.close=function(){}; this.onclick=null;
                    }
                    TitanNotif.permission='granted';
                    TitanNotif.requestPermission=function(cb){
                      var p=Promise.resolve('granted'); if(cb) p.then(cb); return p;};
                    try { Object.defineProperty(window,'Notification',
                      {value:TitanNotif,writable:true,configurable:true}); } catch(e){}
                  }
                })();
              """);
            }
          DART

