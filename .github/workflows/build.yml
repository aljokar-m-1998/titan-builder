name: Titan WebView Builder Pro

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'URL of the app'
        required: true
      app_name:
        description: 'Name of the app'
        required: true
      icon_url:
        description: 'Icon URL (Optional)'
        required: false
        default: ''
      tracking_id:
        description: 'Tracking ID'
        required: true
      webhook_url:
        description: 'Webhook URL'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Flutter WebView project
        run: |
          APP_SLUG=$(echo "${{ github.event.inputs.app_name }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/_/g' \
            | sed 's/__*/_/g' \
            | sed 's/^_//;s/_$//')
          echo "APP_SLUG=$APP_SLUG" >> $GITHUB_ENV

          flutter create \
            --platforms=android \
            --project-name "$APP_SLUG" \
            --org com.titan \
            "$APP_SLUG"

          cd "$APP_SLUG"
          flutter pub add webview_flutter connectivity_plus permission_handler url_launcher

      - name: Inject Permissions and App Name
        run: |
          APP_SLUG=${{ env.APP_SLUG }}
          APP_NAME="${{ github.event.inputs.app_name }}"
          
          MANIFEST="$APP_SLUG/android/app/src/main/AndroidManifest.xml"

          sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>\n    <application|' "$MANIFEST"

          sed -i 's|<application|<application android:usesCleartextTraffic="true"|' "$MANIFEST"
          sed -i "s/android:label=\"[^\"]*\"/android:label=\"$APP_NAME\"/" "$MANIFEST"

      - name: Inject Professional main.dart
        run: |
          APP_SLUG=${{ env.APP_SLUG }}
          APP_NAME="${{ github.event.inputs.app_name }}"
          APP_URL="${{ github.event.inputs.app_url }}"

          cat > "$APP_SLUG/lib/main.dart" << DART
          import 'package:flutter/material.dart';
          import 'package:flutter/services.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          import 'package:connectivity_plus/connectivity_plus.dart';
          import 'package:permission_handler/permission_handler.dart';
          import 'package:url_launcher/url_launcher.dart';

          void main() async {
            WidgetsFlutterBinding.ensureInitialized();
            SystemChrome.setEnabledSystemUIMode(SystemUiMode.edgeToEdge);
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '$APP_NAME',
                debugShowCheckedModeBanner: false,
                theme: ThemeData(useMaterial3: true),
                home: const WebViewPage(),
              );
            }
          }

          class WebViewPage extends StatefulWidget {
            const WebViewPage({super.key});
            @override
            State<WebViewPage> createState() => _WebViewPageState();
          }

          class _WebViewPageState extends State<WebViewPage> {
            late final WebViewController _controller;
            bool _isLoading = true;
            bool _isOffline = false;

            @override
            void initState() {
              super.initState();
              _checkPermissions();
              _initWebView();
              _checkConnectivity();
            }

            void _checkPermissions() async {
              await [Permission.camera, Permission.microphone, Permission.storage].request();
            }

            void _checkConnectivity() async {
              var connectivityResult = await (Connectivity().checkConnectivity());
              setState(() {
                // إصلاح خطأ الـ connectivity_plus للإصدارات الحديثة
                _isOffline = connectivityResult.contains(ConnectivityResult.none);
              });
            }

            void _initWebView() {
              _controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                // استخدام UserAgent لمتصفح كمبيوتر لتخطي حظر جوجل لتسجيل الدخول في WebView
                ..setUserAgent("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36")
                ..setNavigationDelegate(NavigationDelegate(
                  onPageStarted: (url) {
                    setState(() => _isLoading = true);
                  },
                  onPageFinished: (url) {
                    setState(() => _isLoading = false);
                  },
                  onWebResourceError: (error) {
                    setState(() => _isLoading = false); // إخفاء مؤشر التحميل عند الخطأ
                    debugPrint('WebView error: \${error.description}');
                  },
                  onNavigationRequest: (NavigationRequest request) async {
                    // السماح لجميع روابط جوجل وفايربيز بالعمل داخل الـ WebView لضمان حفظ الجلسة
                    if (request.url.contains('accounts.google.com') || request.url.contains('firebaseapp.com')) {
                      return NavigationDecision.navigate;
                    }
                    
                    if (!request.url.startsWith('https://') && !request.url.startsWith('http://')) {
                      if (await canLaunchUrl(Uri.parse(request.url))) {
                        await launchUrl(Uri.parse(request.url), mode: LaunchMode.externalApplication);
                        return NavigationDecision.prevent;
                      }
                    }
                    return NavigationDecision.navigate;
                  },
                ))
                ..loadRequest(Uri.parse('$APP_URL'));
            }

            @override
            Widget build(BuildContext context) {
              return PopScope(
                canPop: false,
                // استخدام onPopInvokedWithResult بدلاً من onPopInvoked لتجنب الـ Warnings
                onPopInvokedWithResult: (didPop, result) async {
                  if (didPop) return;
                  if (await _controller.canGoBack()) {
                    await _controller.goBack();
                  } else {
                    SystemNavigator.pop();
                  }
                },
                child: Scaffold(
                  body: SafeArea(
                    child: Stack(
                      children: [
                        WebViewWidget(controller: _controller),
                        if (_isLoading) 
                          const Center(child: CircularProgressIndicator(color: Colors.blue)),
                        if (_isOffline)
                          Container(
                            color: Colors.white.withOpacity(0.8),
                            child: const Center(
                              // تم إكمال الكود المقطوع هنا
                              child: Column(
                                mainAxisSize: MainAxisSize.min,
                                children: [
                                  Icon(Icons.wifi_off, size: 64, color: Colors.red),
                                  Text("لا يوجد اتصال بالإنترنت", style: TextStyle(fontSize: 18, fontWeight: FontWeight.bold)),
                                ],
                              ),
                            ),
                          ),
                      ],
                    ),
                  ),
                ),
              );
            }
          }
          DART

      - name: Build APK
        run: |
          cd "${{ env.APP_SLUG }}"
          flutter build apk --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webview-apk
          path: "${{ env.APP_SLUG }}/build/app/outputs/flutter-apk/app-release.apk"

      - name: Send webhook callback
        if: always()
        run: |
          STATUS="success"
          if [ "${{ job.status }}" != "success" ]; then STATUS="failure"; fi
          curl -X POST "${{ github.event.inputs.webhook_url }}?tracking_id=${{ github.event.inputs.tracking_id }}" \
            -H "Content-Type: application/json" \
            -H "x-github-event: workflow_run" \
            -d '{
              "action": "completed",
              "workflow_run": {
                "status": "completed",
                "conclusion": "'$STATUS'",
                "html_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                "artifacts_url": "${{ github.api_url }}/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts",
                "head_branch": "main"
              },
              "repository": { "full_name": "${{ github.repository }}" }
            }'
