name: Titan WebView Builder

on:
  workflow_dispatch:
    inputs:
      app_url:
        required: true
      app_name:
        required: true
      icon_url:
        required: false
        default: ''
      tracking_id:
        required: true
      webhook_url:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Flutter WebView project
        run: |
          flutter create --platforms=android webview_app
          cd webview_app
          flutter pub add webview_flutter

      - name: Inject URL and app name
        run: |
          cat > webview_app/lib/main.dart << 'DART'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          void main() => runApp(const MyApp());
          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) => MaterialApp(
              title: '${{ github.event.inputs.app_name }}',
              home: Scaffold(
                body: WebViewWidget(
                  controller: WebViewController()
                    ..setJavaScriptMode(JavaScriptMode.unrestricted)
                    ..loadRequest(Uri.parse('${{ github.event.inputs.app_url }}')),
                ),
              ),
            );
          }
          DART

      - name: Build APK
        working-directory: webview_app
        run: flutter build apk --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webview-apk
          path: webview_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Send webhook callback
        if: always()
        run: |
          STATUS="success"
          if [ "${{ job.status }}" != "success" ]; then STATUS="failure"; fi
          curl -X POST "${{ github.event.inputs.webhook_url }}?tracking_id=${{ github.event.inputs.tracking_id }}" \
            -H "Content-Type: application/json" \
            -H "x-github-event: workflow_run" \
            -d '{
              "action": "completed",
              "workflow_run": {
                "status": "completed",
                "conclusion": "'$STATUS'",
                "html_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                "artifacts_url": "${{ github.api_url }}/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts",
                "head_branch": "main"
              },
              "repository": { "full_name": "${{ github.repository }}" }
            }'
