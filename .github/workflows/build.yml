                  androidNotificationChannelId:   'com.titan.webview.media',
                  androidNotificationChannelName: 'Titan Media',
                  androidNotificationIcon:        'mipmap/ic_launcher',
                  androidShowNotificationBadge:   true,
                  // ✅ FIX-COMPILE: الباكدج نفسها فيها assert وقت الكومبايل بيرفض
                  // ongoing=true مع stopForegroundOnPause=false معًا (سطر تحته).
                  // لكن مفيش داعي لـ "ongoing" أصلاً هنا — لما السيرفس فاضل Foreground
                  // باستمرار (الفلاج اللي تحت) أندرويد نفسه بيمنع مسح الإشعار تلقائيًا،
                  // فـ "ongoing" بقى زيادة بلا فايدة (ده حرفيًا نص رسالة الخطأ).
                  androidNotificationOngoing:     false,
                  // ✅ FIX-LOCKSCREEN: false = الفورجراوند سيرفس مش يوقف لما تعمل pause
                  // كان true = لما تضغط pause يوقف السيرفس → يختفي من شاشة القفل
