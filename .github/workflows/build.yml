                (function() {
                  // ✅ FIX-CAPACITOR: الموقع بيفحص window.Capacitor.isNative عشان يقرر
                  // يحفظ الملف عن طريق Capacitor.Plugins.Filesystem ولا fallback عادي.
                  // إحنا مش تطبيق Capacitor، فـ window.Capacitor كانت undefined →
