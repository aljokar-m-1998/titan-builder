            'Mozilla/5.0 (Linux; Android 14; Pixel 8 Pro Build/UQ1A.240105.004) '
            'AppleWebKit/537.36 (KHTML, like Gecko) '
            'Chrome/124.0.6367.82 Mobile Safari/537.36';

          String _guessMime(String name) {
            final ext = name.toLowerCase().split('.').last;
            switch (ext) {
              case 'jpg': case 'jpeg': return 'image/jpeg';
              case 'png':  return 'image/png';
              case 'gif':  return 'image/gif';
              case 'webp': return 'image/webp';
              case 'mp4': case 'm4v': return 'video/mp4';
              case 'webm': return 'video/webm';
              case 'mkv':  return 'video/x-matroska';
              case 'mp3':  return 'audio/mpeg';
              case 'aac':  return 'audio/aac';
              case 'ogg':  return 'audio/ogg';
              case 'pdf':  return 'application/pdf';
              case 'zip':  return 'application/zip';
              case 'apk':  return 'application/vnd.android.package-archive';
              default:     return 'application/octet-stream';
            }
          }

          // ═══════════════════════════════════════════════════════════════════
          // Local HTTP server — streams device video files with byte-range
          // support so the HTML5 <video> element can seek properly.
          // ═══════════════════════════════════════════════════════════════════
          class _TitanVideoServer {
            static HttpServer? _srv;
            static int _port = 0;

            static Future<void> start() async {
              if (_srv != null) return;
              _srv = await HttpServer.bind(InternetAddress.loopbackIPv4, 0);
              _port = _srv!.port;
              _srv!.listen(_handle, onError: (_) {});
            }

            static Future<void> _handle(HttpRequest req) async {
              try {
                req.response.headers.set('Access-Control-Allow-Origin', '*');
                req.response.headers.set('Access-Control-Allow-Headers', 'Range');
                req.response.headers.set('Access-Control-Expose-Headers', 'Content-Range, Accept-Ranges');
                if (req.method == 'OPTIONS') {
                  req.response.statusCode = 204;
                  await req.response.close();
                  return;
                }
                final filePath = Uri.decodeComponent(req.requestedUri.path.substring(1));
                final file = File(filePath);
                if (!await file.exists()) {
                  req.response.statusCode = 404;
                  await req.response.close();
                  return;
                }
                final len  = await file.length();
                final mime = _mime(filePath);
                req.response.headers.set('Content-Type', mime);
                req.response.headers.set('Accept-Ranges', 'bytes');
                final range = req.headers.value('range');
                if (range != null) {
                  final m = RegExp(r'bytes=(\d*)-(\d*)').firstMatch(range);
                  final s = (m?.group(1)?.isNotEmpty == true) ? int.parse(m!.group(1)!) : 0;
                  final e = (m?.group(2)?.isNotEmpty == true) ? int.parse(m!.group(2)!) : len - 1;
                  req.response.statusCode = 206;
                  req.response.headers.set('Content-Range', 'bytes $s-$e/$len');
                  req.response.headers.contentLength = e - s + 1;
                  await req.response.addStream(file.openRead(s, e + 1));
                } else {
                  req.response.statusCode = 200;
                  req.response.headers.contentLength = len;
                  await req.response.addStream(file.openRead());
                }
              } catch (_) {
                try { req.response.statusCode = 500; } catch (_) {}
              }
              try { await req.response.close(); } catch (_) {}
            }

            static String _mime(String p) {
              final lp = p.toLowerCase();
              if (lp.endsWith('.mp4') || lp.endsWith('.m4v')) return 'video/mp4';
              if (lp.endsWith('.mkv'))  return 'video/x-matroska';
              if (lp.endsWith('.avi'))  return 'video/x-msvideo';
              if (lp.endsWith('.mov'))  return 'video/quicktime';
              if (lp.endsWith('.webm')) return 'video/webm';
              if (lp.endsWith('.3gp'))  return 'video/3gpp';
              // ✅ FIX-PHOTOS/MUSIC: السيرفر المحلي بقى بيخدم الصور والصوتيات
              // كمان (نفس آلية بث الفيديو بالـ byte-range)، مش الفيديو بس
              if (lp.endsWith('.jpg') || lp.endsWith('.jpeg')) return 'image/jpeg';
              if (lp.endsWith('.png'))  return 'image/png';
              if (lp.endsWith('.webp')) return 'image/webp';
              if (lp.endsWith('.gif'))  return 'image/gif';
              if (lp.endsWith('.heic')) return 'image/heic';
              if (lp.endsWith('.bmp'))  return 'image/bmp';
              if (lp.endsWith('.mp3'))  return 'audio/mpeg';
              if (lp.endsWith('.m4a'))  return 'audio/mp4';
              if (lp.endsWith('.aac'))  return 'audio/aac';
              if (lp.endsWith('.wav'))  return 'audio/wav';
              if (lp.endsWith('.ogg'))  return 'audio/ogg';
              if (lp.endsWith('.flac')) return 'audio/flac';
              return 'video/mp4';
            }

            // ✅ FIX: أزلنا \$ اللي كان بيعطل الـ interpolation في single-quoted heredoc
            static String urlFor(String filePath) =>
                'http://127.0.0.1:$_port/${Uri.encodeComponent(filePath)}';
          }

          class TitanAudioHandler extends BaseAudioHandler with QueueHandler, SeekHandler {
            // ✅ FIX-BRIDGE: callback يتصل بالـ WebView عشان نتحكم في الميديا من الإشعار
            // يُضبط في onWebViewCreated ويُصفَّر عند dispose
            Function(String)? _evalJS;
            void attachEval(Function(String) fn) => _evalJS = fn;
            void detachEval()                    => _evalJS = null;

            // ✅ FIX-BRIDGE: play/pause من الإشعار يؤثر فعلياً على الـ WebView
            @override
            Future<void> play() async {
              _evalJS?.call(
                'document.querySelectorAll("video,audio")'
                '.forEach(function(m){m.play().catch(function(){});});'
              );
              updatePlaybackState(true);
            }

            @override
            Future<void> pause() async {
              _evalJS?.call(
                'document.querySelectorAll("video,audio")'
                '.forEach(function(m){m.pause();});'
              );
              updatePlaybackState(false);
            }

            @override
            Future<void> stop() async {
              _evalJS?.call(
                'document.querySelectorAll("video,audio")'
                '.forEach(function(m){m.pause();m.currentTime=0;});'
              );
              playbackState.add(playbackState.value.copyWith(
                playing: false,
                processingState: AudioProcessingState.idle,
                controls: [],
              ));
            }

            // ✅ FIX-BRIDGE: seek من شريط الإشعار يحرك الميديا في الـ WebView
            @override
            Future<void> seek(Duration position) async {
              final secs = position.inMilliseconds / 1000.0;
              _evalJS?.call(
                'document.querySelectorAll("video,audio")'
                '.forEach(function(m){m.currentTime=$secs;});'
              );
            }

            @override Future<void> skipToNext()     async {}
            @override Future<void> skipToPrevious() async {}

            void setNowPlaying(String title, String artUrl, {
              double duration = 0, double position = 0,
            }) {
              Uri? art;
              if (artUrl.isNotEmpty) { try { art = Uri.parse(artUrl); } catch (_) {} }

              // ✅ FIX-ID: ID ثابت مبني على العنوان — بدل UUID جديد كل مرة
              // كان UUID الجديد بيخلي audio_service يعامله كمقطع جديد ويعيد تهيئة الإشعار
              final stableId = 'titan:${title.hashCode}';

              mediaItem.add(MediaItem(
                id:       stableId,
                title:    title.isNotEmpty ? title : kAppName,
                album:    kAppName,
                artUri:   art,
                playable: true,
                duration: duration > 0
                    ? Duration(milliseconds: (duration * 1000).toInt())
                    : null,
              ));

              if (playbackState.value.processingState == AudioProcessingState.idle) {
                updatePlaybackState(true);
              }
            }

            void updatePlaybackState(bool playing, {double position = 0, double duration = 0}) {
              playbackState.add(playbackState.value.copyWith(
                playing:  playing,
                // ✅ FIX-CONTROLS: 3 أزرار في الإشعار بدل زر واحد
                controls: [
                  MediaControl.skipToPrevious,
                  playing ? MediaControl.pause : MediaControl.play,
                  MediaControl.skipToNext,
                ],
                systemActions: const {
                  MediaAction.play, MediaAction.pause, MediaAction.stop,
                  MediaAction.seek, MediaAction.seekForward, MediaAction.seekBackward,
                },
                // ✅ FIX-COMPACT: الأزرار الثلاثة تظهر في الإشعار المصغر
                androidCompactActionIndices: const [0, 1, 2],
                processingState: AudioProcessingState.ready,
                updatePosition: Duration(milliseconds: (position * 1000).toInt()),
                bufferedPosition: duration > 0
                    ? Duration(milliseconds: (duration * 1000).toInt())
                    : Duration.zero,
              ));
            }
          }

          TitanAudioHandler? _audioHandler;

          // FCM_BACKGROUND_HANDLER_PLACEHOLDER

          void main() async {
            WidgetsFlutterBinding.ensureInitialized();
            // FCM_INIT_PLACEHOLDER

            try {
              _audioHandler = await AudioService.init(
                builder: () => TitanAudioHandler(),
