            Future<void> _requestPermissions() async {
              if (kEnableCamera) {
                await [Permission.camera, Permission.microphone].request();
              }
              if (kEnableLocation) {
                await Permission.locationWhenInUse.request();
              }
              if (kEnableStorage && Platform.isAndroid) {
                final sdkInt = await _getSdkInt();
                if (sdkInt >= 33) {
                  await [Permission.photos, Permission.videos, Permission.audio].request();
                } else if (sdkInt >= 30) {
                  final s = await Permission.manageExternalStorage.status;
                  if (!s.isGranted) await Permission.manageExternalStorage.request();
                } else {
                  await Permission.storage.request();
                }
              }
              // Always request notification permission
              if (Platform.isAndroid) {
                final sdkInt = await _getSdkInt();
                if (sdkInt >= 33) {
                  final s = await Permission.notification.status;
                  if (s.isDenied)               await Permission.notification.request();
                  else if (s.isPermanentlyDenied) await openAppSettings();
                }
              }
              // ✅ FIX: طلب إذن الـ overlay (الظهور فوق التطبيقات) — صلاحية خاصة تحتاج Settings
              if (Platform.isAndroid) {
                try {
                  const ch = MethodChannel('titan_download');
                  final granted = await ch.invokeMethod<bool>('checkOverlayPermission') ?? false;
                  if (!granted) await ch.invokeMethod('requestOverlayPermission');
                } catch (e) { debugPrint('overlay perm: $e'); }
              }
            }

            Future<int> _getSdkInt() async {
              try { return (await DeviceInfoPlugin().androidInfo).version.sdkInt; }
              catch (_) { return 33; }
            }

            Future<void> _checkConnectivity() async {
              final r = await Connectivity().checkConnectivity();
              if (mounted) setState(() => _offline = r.contains(ConnectivityResult.none));
            }

            void _enterFullscreen() {
              setState(() => _fullscreen = true);
              SystemChrome.setPreferredOrientations([DeviceOrientation.landscapeLeft, DeviceOrientation.landscapeRight]);
              SystemChrome.setEnabledSystemUIMode(SystemUiMode.immersiveSticky);
            }

            void _exitFullscreen() {
              setState(() => _fullscreen = false);
              SystemChrome.setPreferredOrientations([DeviceOrientation.portraitUp, DeviceOrientation.portraitDown]);
              SystemChrome.setEnabledSystemUIMode(SystemUiMode.edgeToEdge);
            }

            // ✅ FIX الرئيسي: blob → JS bridge (unchanged)
            //    HTTPS → Dio download → saveToDownloads (كان launchUrl وبيفشل)
            Future<void> _handleDownload(String url, String? suggestedFilename, String? mimeType) async {
              if (url.startsWith('blob:')) {
                final safeName = (suggestedFilename ?? 'download').replaceAll("'", '_');
                await _ctrl?.evaluateJavascript(source:
                    'window._dlU=\'' + url + '\';window._dlN=\'' + safeName + '\';');
                await _ctrl?.evaluateJavascript(source: r"""
                  (function(){
                    var u=window._dlU, n=window._dlN;
                    if(!u||!window.flutter_inappwebview) return;
                    fetch(u).then(function(r){return r.blob();})
                      .then(function(b){return new Promise(function(res,rej){
                        var fr=new FileReader();
                        fr.onload=function(){res(fr.result);}; fr.onerror=rej;
                        fr.readAsDataURL(b);});})
                      .then(function(d){
                        window.flutter_inappwebview.callHandler('saveFileBytes',
                          {data:d,fileName:n,mimeType:''});})
                      .catch(function(e){console.warn('[Titan] blob fallback:',e);});
                  })();
                """);
                return;
              }

              final uri = Uri.tryParse(url);
              if (uri == null) return;

              // استخراج اسم الملف من الـ URL أو من الـ suggestedFilename
              String fileName = suggestedFilename ?? '';
              if (fileName.isEmpty) {
                final seg = url.split('/').last.split('?').first;
                // ✅ FIX: بدون \$ عشان يشتغل Dart string interpolation في single-quoted heredoc
                fileName = seg.isNotEmpty ? seg : 'download_${DateTime.now().millisecondsSinceEpoch}';
              }
              final safeMime = (mimeType?.isNotEmpty == true) ? mimeType! : _guessMime(fileName);

              // نعرض رسالة "جاري التحميل"
              if (mounted) {
                ScaffoldMessenger.of(context).showSnackBar(SnackBar(
                  content: Text('⏬ جاري تحميل $fileName...'),
                  duration: const Duration(seconds: 30)));
              }

              try {
                // نحمل الملف بـ Dio للـ temp folder
                final tmpDir  = await getTemporaryDirectory();
                // ✅ FIX: بدون \$ عشان يشتغل Dart string interpolation
                final tmpPath = '${tmpDir.path}/$fileName';
                await Dio().download(url, tmpPath);

                // نحفظ من الـ temp للـ Downloads عبر الـ Kotlin channel
                const ch = MethodChannel('titan_download');
                final ok = await ch.invokeMethod<String>('saveToDownloads', {
                  'sourcePath': tmpPath,
                  'fileName':   fileName,
                  'mimeType':   safeMime,
                });
                if (mounted) {
                  ScaffoldMessenger.of(context).clearSnackBars();
                  ScaffoldMessenger.of(context).showSnackBar(SnackBar(
                    content: Text(ok == 'saved' ? '✅ تم الحفظ: $fileName' : '❌ فشل حفظ الملف'),
                    duration: const Duration(seconds: 3)));
                }
              } catch (e) {
                debugPrint('_handleDownload error: $e');
                // Fallback: حاول تفتح في الـ browser
                try {
                  await launchUrl(uri, mode: LaunchMode.externalApplication);
                } catch (_) {
                  if (mounted) {
                    ScaffoldMessenger.of(context).clearSnackBars();
                    ScaffoldMessenger.of(context).showSnackBar(
                      const SnackBar(content: Text('❌ تعذّر تحميل الملف')));
                  }
                }
              }
            }

            @override
            void dispose() {
              // ✅ FIX-BRIDGE: فك الربط بين الـ WebView والـ audioHandler عند التخلص
              _audioHandler?.detachEval();
              WidgetsBinding.instance.removeObserver(this);
              super.dispose();
            }

            // ✅ FIX-AUDIO: Flutter بيعمل pauseTimers للـ WebView لما الشاشة تضلم
            // → نعمل resumeTimers فوراً عشان الصوت يفضل شغال في الخلفية
            @override
            void didChangeAppLifecycleState(AppLifecycleState state) {
              super.didChangeAppLifecycleState(state);
              if (state == AppLifecycleState.paused ||
                  state == AppLifecycleState.hidden) {
                Future.delayed(Duration.zero, () => _ctrl?.resumeTimers());
              } else if (state == AppLifecycleState.resumed) {
                _ctrl?.resumeTimers();
              }
            }

            @override
            Widget build(BuildContext context) {
              return PopScope(
                canPop: false,
                onPopInvokedWithResult: (didPop, _) async {
                  if (didPop) return;
                  if (_fullscreen) { _exitFullscreen(); return; }
                  if (_ctrl != null && await _ctrl!.canGoBack()) { await _ctrl!.goBack(); return; }
                  SystemNavigator.pop();
                },
                child: Scaffold(
                  resizeToAvoidBottomInset: false, // ✅ FIX-KEYBOARD: يمنع resize عند فتح الكيبورد
                  backgroundColor: Colors.black,
                  // ✅ FIX-OFFLINE: لحظات بسيطة لحسم مصدر التحميل (نت/كاش) قبل
                  // ما الـ WebView يُبنى أصلاً — يمنع وميض شاشة خطأ لا داعي له
                  body: !_initDecisionMade
                    ? const Center(child: CircularProgressIndicator(color: Colors.white24))
                    : SafeArea(
                    top: !_fullscreen, bottom: !_fullscreen,
                    child: Stack(children: [

                      InAppWebView(
                        initialUrlRequest: _useOfflineShell
                            ? null : URLRequest(url: WebUri(kAppUrl)),
                        // ✅ FIX-OFFLINE: نفتح من النسخة المحفوظة محليًا لو معندناش نت
                        // — baseUrl يفضل يشاور على الدومين الحقيقي عشان أي مسارات
                        // نسبية (JS/CSS) تحاول تتحمّل من نفس الكاش الطبيعي للمتصفح
                        initialData: _useOfflineShell
                            ? InAppWebViewInitialData(
                                data: _cachedShellHtml,
                                mimeType: 'text/html',
                                encoding: 'utf-8',
                                baseUrl: WebUri(kAppUrl),
                              )
                            : null,
                        initialSettings: InAppWebViewSettings(
                          javaScriptEnabled: true,
                          javaScriptCanOpenWindowsAutomatically: true,
                          domStorageEnabled: true, databaseEnabled: true,
                          cacheEnabled: true, clearCache: false,
                          // ✅ FIX-OFFLINE: لو فاتح من الكاش، نفضّل أي نسخة محفوظة
                          // من باقي الموارد (JS/CSS) بدل ما نحاول الشبكة ونفشل
                          cacheMode: _useOfflineShell
                              ? CacheMode.LOAD_CACHE_ELSE_NETWORK : CacheMode.LOAD_DEFAULT,
                          networkAvailable: !_offline,
                          allowFileAccessFromFileURLs: true,
                          allowUniversalAccessFromFileURLs: true,
                          thirdPartyCookiesEnabled: true,
                          userAgent: kUserAgent,
                          useShouldOverrideUrlLoading: true,
                          useOnDownloadStart: true,
                          supportZoom: true, builtInZoomControls: false,
                          displayZoomControls: false, supportMultipleWindows: true,
                          mixedContentMode: MixedContentMode.MIXED_CONTENT_ALWAYS_ALLOW,
                          geolocationEnabled: kEnableLocation,
                          mediaPlaybackRequiresUserGesture: false,
                          allowsInlineMediaPlayback: true,
                          allowsAirPlayForMediaPlayback: true,
                          transparentBackground: false,
                        ),

                        onWebViewCreated: (c) => _ctrl = c,
                        onLoadStart: (c, url) {
                          if (mounted) setState(() { _loading = true; _error = false; });
                        },
                        onLoadStop: (c, url) async {
                          if (mounted) setState(() { _loading = false; _hasLoadedOnce = true; });
                          final p = await SharedPreferences.getInstance();
                          await p.setString('lastUrl', url?.toString() ?? kAppUrl);
                          _setupMediaBridge(c);
                          _cacheShellForOffline(); // ✅ FIX-OFFLINE: تحديث النسخة المحفوظة
                          // FCM_PUSH_TOKEN_PLACEHOLDER
                        },
                        onReceivedError: (c, req, err) {
                          if (req.isForMainFrame == true && mounted)
                            setState(() { _loading = false; _error = true; });
                        },
                        onEnterFullscreen: (c) => _enterFullscreen(),
                        onExitFullscreen:  (c) => _exitFullscreen(),
                        onPermissionRequest: (c, req) async =>
                          PermissionResponse(resources: req.resources, action: PermissionResponseAction.GRANT),
                        onGeolocationPermissionsShowPrompt: (c, origin) async =>
                          GeolocationPermissionShowPromptResponse(origin: origin, allow: kEnableLocation, retain: true),
                        shouldOverrideUrlLoading: (c, nav) async {
                          final uri = nav.request.url;
                          if (uri == null) return NavigationActionPolicy.ALLOW;
                          final s = uri.scheme.toLowerCase();
                          if (s=='http'||s=='https'||s=='blob') return NavigationActionPolicy.ALLOW;
                          if (await canLaunchUrl(uri)) {
                            await launchUrl(uri, mode: LaunchMode.externalApplication);
                            return NavigationActionPolicy.CANCEL;
                          }
                          return NavigationActionPolicy.ALLOW;
                        },
                        onCreateWindow: (c, action) async {
                          showDialog(context: context, builder: (ctx) => AlertDialog(
                            contentPadding: EdgeInsets.zero,
                            content: SizedBox(
                              width: MediaQuery.of(ctx).size.width,
                              height: MediaQuery.of(ctx).size.height * 0.85,
                              child: Column(children: [
                                Align(alignment: Alignment.topRight,
                                  child: IconButton(icon: const Icon(Icons.close), onPressed: () => Navigator.pop(ctx))),
                                Expanded(child: InAppWebView(
                                  windowId: action.windowId,
                                  initialSettings: InAppWebViewSettings(
                                    javaScriptEnabled: true,
                                    thirdPartyCookiesEnabled: true, userAgent: kUserAgent),
                                  onCloseWindow: (c) async {
                                    if (Navigator.canPop(ctx)) Navigator.pop(ctx); },
                                )),
                              ]),
                            ),
                          ));
                          return true;
                        },
                        onDownloadStartRequest: (c, req) async {
                          await _handleDownload(req.url.toString(), req.suggestedFilename, req.mimeType);
                        },
                      ),

                      if (_loading && !_error)
                        const Positioned(top: 0, left: 0, right: 0,
                          child: LinearProgressIndicator(
                            backgroundColor: Colors.transparent, color: Colors.blue, minHeight: 3)),

                      // ✅ FIX-OFFLINE: شريط بسيط يوضّح إنك شغال على نسخة محفوظة
                      if (_offline && _useOfflineShell)
                        Positioned(top: 0, left: 0, right: 0,
                          child: Container(
                            color: const Color(0xFF424242),
                            padding: const EdgeInsets.symmetric(vertical: 6),
                            child: const Text('وضع عدم الاتصال — تعرض بيانات محفوظة',
                              textAlign: TextAlign.center,
                              style: TextStyle(color: Colors.white, fontSize: 12)),
                          )),

                      // ✅ FIX-OFFLINE: نخفي شاشة "مفيش نت" دي لو فاتحين أصلاً من
                      // نسخة محفوظة (الموقع شغال ومحتواه ظاهر تحتها فعليًا)
                      if (_offline && !_hasLoadedOnce && !_useOfflineShell)
                        Container(color: Colors.white, child: Center(child: Column(mainAxisSize: MainAxisSize.min, children: [
                          const Icon(Icons.wifi_off_rounded, size: 72, color: Color(0xFFE53935)),
                          const SizedBox(height: 16),
                          const Text('لا يوجد اتصال بالإنترنت', style: TextStyle(fontSize: 18, fontWeight: FontWeight.bold)),
                          const SizedBox(height: 8),
                          const Text('افتح التطبيق مرة على الإنترنت أولاً لتفعيل العمل دون اتصال', style: TextStyle(color: Color(0xFF757575)), textAlign: TextAlign.center),
                          const SizedBox(height: 24),
                          ElevatedButton.icon(
                            onPressed: () { _checkConnectivity(); _ctrl?.reload(); },
                            icon: const Icon(Icons.refresh_rounded),
                            label: const Text('إعادة المحاولة')),
                        ]))),

                      if (_error && !_offline)
                        Container(color: Colors.white, child: Center(child: Column(mainAxisSize: MainAxisSize.min, children: [
                          const Icon(Icons.error_outline_rounded, size: 72, color: Color(0xFFFF7043)),
                          const SizedBox(height: 16),
                          const Text('تعذر تحميل الصفحة', style: TextStyle(fontSize: 18, fontWeight: FontWeight.bold)),
                          const SizedBox(height: 24),
                          Row(mainAxisSize: MainAxisSize.min, children: [
                            ElevatedButton.icon(
                              onPressed: () => _ctrl?.reload(),
                              icon: const Icon(Icons.refresh_rounded),
                              label: const Text('إعادة التحميل')),
                            const SizedBox(width: 12),
                            OutlinedButton.icon(
                              onPressed: () => _ctrl?.loadUrl(urlRequest: URLRequest(url: WebUri(kAppUrl))),
                              icon: const Icon(Icons.home_rounded),
                              label: const Text('الرئيسية')),
                          ]),
                        ]))),
                    ]),
                  ),
                ),
              );
            }
          }
          DART

      # ── Step 6: Inject MainActivity Kotlin ─────────────────────────────────
      - name: Inject MainActivity Kotlin (notifications, overlay, video & download)
        if: env.BUILD_TYPE == 'webview' || env.BUILD_TYPE == '' || !env.BUILD_TYPE
        env:
          APP_SLUG: ${{ env.APP_SLUG }}
        run: |
          PKG_PATH="$APP_SLUG/android/app/src/main/kotlin/com/titan/$APP_SLUG"
          mkdir -p "$PKG_PATH"

          cat > "$PKG_PATH/MainActivity.kt" << 'KOTLIN'
          package com.titan.APP_SLUG_PLACEHOLDER

          import android.app.Activity
          import android.app.NotificationChannel
          import android.app.NotificationManager
          import android.app.PendingIntent
          import android.app.PictureInPictureParams
          import android.app.RecoverableSecurityException
          import android.content.ContentValues
          import android.content.Context
          import android.content.Intent
          import android.content.res.Configuration
          import android.database.Cursor
          import android.graphics.Bitmap
          import android.media.MediaMetadataRetriever
          import android.media.MediaScannerConnection
          import android.media.ThumbnailUtils
          import android.net.Uri
          import android.os.Build
          import android.os.Bundle
          import android.os.Environment
          import android.provider.MediaStore
          import android.provider.Settings
          import android.util.Base64
          import android.util.Rational
          import androidx.core.app.NotificationCompat
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel
          import java.io.ByteArrayOutputStream
          import java.io.File

          class MainActivity : FlutterActivity() {
            private val CHANNEL        = "titan_download"
            private val NOTIF_CHANNEL  = "titan_channel"
            private val DELETE_REQUEST_CODE = 7321

            // ✅ FIX-DELETE: نخزن نتيجة طلب الحذف لحد ما المستخدم يوافق/يرفض
            // من نافذة النظام (مطلوب من أندرويد 10+ للملفات اللي التطبيق مش مالكها)
            private var pendingDeleteResult: MethodChannel.Result? = null

            // ✅ FIX-SHARE: نخزن بيانات المشاركة الواردة لحد ما الـ WebView يبقى جاهز يسحبها
            private var pendingShare: Map<String, String>? = null

            // ✅ FIX: نسجل الـ notification channel لما التطبيق يفتح (لازم قبل أي إشعار)
            override fun onCreate(savedInstanceState: Bundle?) {
              super.onCreate(savedInstanceState)
              createNotificationChannel()
              // ✅ FIX-SHARE: تشغيل بارد — التطبيق اتفتح مباشرة من المشاركة
              pendingShare = extractShareIntent(intent)
            }

            // ✅ FIX-SHARE: تشغيل دافئ — التطبيق شغال بالفعل والمستخدم بعت مشاركة جديدة
            override fun onNewIntent(intent: Intent) {
              super.onNewIntent(intent)
              val data = extractShareIntent(intent) ?: return
              flutterEngine?.dartExecutor?.binaryMessenger?.let { messenger ->
                MethodChannel(messenger, CHANNEL).invokeMethod("onSharedContent", data)
              }
            }

            // ✅ FIX-DELETE: أندرويد 10/11+ بيرجع نتيجة موافقة المستخدم هنا —
            // لازم نكمل الـ Future بتاع Dart بالنتيجة الصحيحة (نجح/رفض المستخدم)
            @Deprecated("Deprecated in Java")
            override fun onActivityResult(requestCode: Int, resultCode: Int, data: Intent?) {
              super.onActivityResult(requestCode, resultCode, data)
              if (requestCode == DELETE_REQUEST_CODE) {
                if (resultCode == Activity.RESULT_OK) {
                  pendingDeleteResult?.success("deleted")
                } else {
                  pendingDeleteResult?.success("cancelled")
                }
                pendingDeleteResult = null
              }
            }

            // ✅ FIX-DELETE/SHARE: يحوّل مسار ملف فعلي لـ content:// URI من MediaStore
            // (مطلوب للحذف والمشاركة الآمنين بدل التعامل المباشر مع المسار)
            private fun getMediaStoreUri(filePath: String): Uri? {
              val collections = listOf(
                MediaStore.Video.Media.EXTERNAL_CONTENT_URI,
                MediaStore.Audio.Media.EXTERNAL_CONTENT_URI,
                MediaStore.Images.Media.EXTERNAL_CONTENT_URI
              )
              for (collection in collections) {
                val cursor = contentResolver.query(
                  collection, arrayOf(MediaStore.MediaColumns._ID),
                  "${MediaStore.MediaColumns.DATA} = ?", arrayOf(filePath), null
                )
                cursor?.use {
                  if (it.moveToFirst()) {
                    val id = it.getLong(0)
                    return Uri.withAppendedPath(collection, id.toString())
                  }
                }
              }
              return null
            }

            // ✅ FIX-SHARE: يستخرج title/text/url من intent المشاركة — نفس مفاتيح
            // share_target.params في manifest.json بتاع الموقع (معيار PWA قياسي)
            private fun extractShareIntent(intent: Intent?): Map<String, String>? {
              if (intent?.action != Intent.ACTION_SEND) return null
              val text = intent.getStringExtra(Intent.EXTRA_TEXT) ?: ""
              val subj = intent.getStringExtra(Intent.EXTRA_SUBJECT) ?: ""
              if (text.isEmpty() && subj.isEmpty()) return null
              val looksLikeUrl = text.startsWith("http://") || text.startsWith("https://")
              return mapOf(
                "title" to subj,
                "text"  to text,
                "url"   to (if (looksLikeUrl) text else "")
              )
            }

            private fun createNotificationChannel() {
              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                val channel = NotificationChannel(
                  NOTIF_CHANNEL,
                  "Titan Notifications",
                  // ✅ FIX-NOTIF: IMPORTANCE_DEFAULT كانت بتمنع ظهور heads-up
                  // (التنبيه المنبثق فوق الشاشة) — تطبيقات الشات لازم HIGH
                  NotificationManager.IMPORTANCE_HIGH
                ).apply {
                  description = "App notifications"
                  enableLights(true)
                  enableVibration(true)
                  setShowBadge(true)
                }
                val nm = getSystemService(Context.NOTIFICATION_SERVICE) as NotificationManager
                nm.createNotificationChannel(channel)
              }
            }

            override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
              super.configureFlutterEngine(flutterEngine)
              MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL)
                .setMethodCallHandler { call, result ->
                  when (call.method) {

                    "saveToDownloads" -> {
                      val sourcePath = call.argument<String>("sourcePath") ?: ""
                      val fileName   = call.argument<String>("fileName")   ?: "download"
                      val mimeType   = call.argument<String>("mimeType")   ?: "*/*"
                      try {
                        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                          val values = ContentValues().apply {
                            put(MediaStore.Downloads.DISPLAY_NAME, fileName)
                            put(MediaStore.Downloads.MIME_TYPE, mimeType)
                            put(MediaStore.Downloads.IS_PENDING, 1)
                          }
                          val uri = contentResolver.insert(
                            MediaStore.Downloads.EXTERNAL_CONTENT_URI, values
                          )
                          if (uri != null) {
                            contentResolver.openOutputStream(uri)?.use { out ->
                              File(sourcePath).inputStream().use { it.copyTo(out) }
                            }
                            values.clear()
                            values.put(MediaStore.Downloads.IS_PENDING, 0)
                            contentResolver.update(uri, values, null, null)
                            result.success("saved")
                          } else {
                            result.error("MEDIA_STORE_FAIL", "Could not create MediaStore entry", null)
                          }
                        } else {
                          val dlDir = Environment.getExternalStoragePublicDirectory(
                            Environment.DIRECTORY_DOWNLOADS
                          )
                          dlDir.mkdirs()
                          val dest = File(dlDir, fileName)
                          File(sourcePath).copyTo(dest, overwrite = true)
                          MediaScannerConnection.scanFile(
                            this, arrayOf(dest.absolutePath), arrayOf(mimeType), null
                          )
                          result.success("saved")
                        }
                      } catch (e: Exception) {
                        result.error("SAVE_ERROR", e.message ?: "Unknown error", null)
                      }
                    }

                    // ✅ FIX: كان مفقود — دلوقتي بيعرض إشعار native حقيقي
                    "showNotification" -> {
                      val title = call.argument<String>("title") ?: ""
                      val body  = call.argument<String>("body")  ?: ""
                      try {
                        val nm = getSystemService(Context.NOTIFICATION_SERVICE) as NotificationManager
                        val pi = packageManager.getLaunchIntentForPackage(packageName)
                          ?.let { PendingIntent.getActivity(
                            this, 0, it,
                            PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE
                          )}
                        val notif = NotificationCompat.Builder(this, NOTIF_CHANNEL)
                          // ✅ FIX-NOTIF: أيقونة التطبيق الحقيقية بدل أيقونة نظام عامة (i)
                          .setSmallIcon(R.mipmap.ic_launcher)
                          .setContentTitle(title)
                          .setContentText(body)
                          .setAutoCancel(true)
                          .setPriority(NotificationCompat.PRIORITY_HIGH)
                          .apply { if (pi != null) setContentIntent(pi) }
                          .build()
                        nm.notify(System.currentTimeMillis().toInt(), notif)
                        result.success("sent")
                      } catch (e: Exception) {
                        result.error("NOTIF_ERROR", e.message ?: "Unknown error", null)
                      }
                    }

                    // ✅ FIX: كان مفقود — بيتحقق من إذن الـ overlay
                    "checkOverlayPermission" -> {
                      val granted = if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M)
                        Settings.canDrawOverlays(this) else true
                      result.success(granted)
                    }

                    // ✅ FIX: كان مفقود — بيفتح Settings عشان المستخدم يديه إذن الـ overlay
                    "requestOverlayPermission" -> {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M &&
                          !Settings.canDrawOverlays(this)) {
                        startActivity(Intent(
                          Settings.ACTION_MANAGE_OVERLAY_PERMISSION,
                          Uri.parse("package:$packageName")
                        ).apply { addFlags(Intent.FLAG_ACTIVITY_NEW_TASK) })
                      }
                      result.success(null)
                    }

                    "openDownloadsFolder" -> {
                      try {
                        val intent = Intent(Intent.ACTION_VIEW).apply {
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                            data = MediaStore.Downloads.EXTERNAL_CONTENT_URI
                          } else {
                            val dlDir = Environment.getExternalStoragePublicDirectory(
                              Environment.DIRECTORY_DOWNLOADS
                            )
                            data = Uri.fromFile(dlDir)
                          }
                          addFlags(Intent.FLAG_ACTIVITY_NEW_TASK)
                        }
                        startActivity(intent)
                        result.success("opened")
                      } catch (e: Exception) {
                        result.error("OPEN_ERROR", e.message ?: "Unknown error", null)
                      }
                    }

                    "openExternalUrl" -> {
                      val url = call.argument<String>("url") ?: ""
                      if (url.isEmpty()) {
                        result.error("INVALID_URL", "URL is empty", null)
                        return@setMethodCallHandler
                      }
                      try {
                        val intent = Intent(Intent.ACTION_VIEW, Uri.parse(url)).apply {
                          addFlags(Intent.FLAG_ACTIVITY_NEW_TASK)
                        }
                        startActivity(intent)
                        result.success("opened")
                      } catch (e: Exception) {
                        result.error("OPEN_ERROR", e.message ?: "Unknown error", null)
                      }
                    }

                    "getDeviceVideos" -> {
                      try {
                        val videos = mutableListOf<Map<String, Any?>>()
                        val projection = arrayOf(
                          MediaStore.Video.Media._ID,
                          MediaStore.Video.Media.DISPLAY_NAME,
                          MediaStore.Video.Media.DURATION,
                          MediaStore.Video.Media.DATA
                        )
                        val sortOrder = "${MediaStore.Video.Media.DATE_MODIFIED} DESC"
                        val cursor: Cursor? = contentResolver.query(
                          MediaStore.Video.Media.EXTERNAL_CONTENT_URI,
                          projection, null, null, sortOrder
                        )
                        cursor?.use { c ->
                          val idCol    = c.getColumnIndexOrThrow(MediaStore.Video.Media._ID)
                          val nameCol  = c.getColumnIndexOrThrow(MediaStore.Video.Media.DISPLAY_NAME)
                          val durCol   = c.getColumnIndexOrThrow(MediaStore.Video.Media.DURATION)
                          val dataCol  = c.getColumnIndexOrThrow(MediaStore.Video.Media.DATA)
                          while (c.moveToNext() && videos.size < 200) {
                            val id       = c.getLong(idCol)
                            val name     = c.getString(nameCol) ?: "Video"
                            val dur      = c.getLong(durCol) / 1000.0
                            val filePath = c.getString(dataCol) ?: ""
                            if (filePath.isEmpty() || !File(filePath).exists()) continue
                            val videoUri = Uri.withAppendedPath(
                              MediaStore.Video.Media.EXTERNAL_CONTENT_URI, id.toString()
                            )
                            var thumbB64 = ""
                            try {
                              val bmp: Bitmap? = if (Build.VERSION.SDK_INT >= 29) {
                                contentResolver.loadThumbnail(videoUri, android.util.Size(120, 120), null)
                              } else {
                                @Suppress("DEPRECATION")
                                ThumbnailUtils.createVideoThumbnail(filePath, MediaStore.Images.Thumbnails.MINI_KIND)
                              }
                              if (bmp != null) {
                                val bos = ByteArrayOutputStream()
                                bmp.compress(Bitmap.CompressFormat.JPEG, 60, bos)
                                thumbB64 = "data:image/jpeg;base64," +
                                  Base64.encodeToString(bos.toByteArray(), Base64.NO_WRAP)
                                bmp.recycle()
                              }
                            } catch (_: Exception) {}

                            // ✅ FIX-VTT: لو فيه ملف ترجمة .vtt بنفس اسم الفيديو في نفس
                            // المجلد، نقرأه ونرجّعه — يتحمّل تلقائيًا أثناء التشغيل
                            var subtitleVtt: String? = null
                            try {
                              val vidFile = File(filePath)
                              val vttFile = File(vidFile.parentFile, vidFile.nameWithoutExtension + ".vtt")
                              if (vttFile.exists() && vttFile.length() in 1..2_000_000) {
                                subtitleVtt = vttFile.readText(Charsets.UTF_8)
                              }
                            } catch (_: Exception) {}

                            videos.add(mapOf(
                              "filePath"    to filePath,
                              "title"       to name.substringBeforeLast('.'),
                              "duration"    to dur,
                              "thumbnail"   to thumbB64,
                              "subtitleVtt" to subtitleVtt
                            ))
                          }
                        }
                        result.success(videos)
                      } catch (e: Exception) {
                        result.error("VIDEO_ERROR", e.message ?: "Unknown error", null)
                      }
                    }

                    // ✅ FIX-MUSIC: مكتبة الموسيقى — MediaStore.Audio + غلاف الألبوم
                    // المضمّن في الملف نفسه (أدق وأشمل من عمود الألبوم القديم المهجور)
                    "getDeviceAudios" -> {
                      try {
                        val audios = mutableListOf<Map<String, Any?>>()
                        val projection = arrayOf(
                          MediaStore.Audio.Media._ID,
                          MediaStore.Audio.Media.TITLE,
                          MediaStore.Audio.Media.ARTIST,
                          MediaStore.Audio.Media.DURATION,
                          MediaStore.Audio.Media.DATA
                        )
                        val selection = "${MediaStore.Audio.Media.IS_MUSIC} != 0"
                        val sortOrder = "${MediaStore.Audio.Media.DATE_MODIFIED} DESC"
                        val cursor: Cursor? = contentResolver.query(
                          MediaStore.Audio.Media.EXTERNAL_CONTENT_URI,
                          projection, selection, null, sortOrder
                        )
                        cursor?.use { c ->
                          val titleCol  = c.getColumnIndexOrThrow(MediaStore.Audio.Media.TITLE)
                          val artistCol = c.getColumnIndexOrThrow(MediaStore.Audio.Media.ARTIST)
                          val durCol    = c.getColumnIndexOrThrow(MediaStore.Audio.Media.DURATION)
                          val dataCol   = c.getColumnIndexOrThrow(MediaStore.Audio.Media.DATA)
                          val retriever = MediaMetadataRetriever()
                          while (c.moveToNext() && audios.size < 300) {
                            val title    = c.getString(titleCol) ?: "Unknown"
                            val artist   = c.getString(artistCol) ?: ""
                            val dur      = c.getLong(durCol) / 1000.0
                            val filePath = c.getString(dataCol) ?: ""
                            if (filePath.isEmpty() || !File(filePath).exists()) continue

                            var thumbB64 = ""
                            try {
                              retriever.setDataSource(filePath)
                              val art = retriever.embeddedPicture
                              if (art != null) {
                                thumbB64 = "data:image/jpeg;base64," +
                                  Base64.encodeToString(art, Base64.NO_WRAP)
                              }
                            } catch (_: Exception) {}

                            audios.add(mapOf(
                              "filePath" to filePath,
                              "title"    to title,
                              "artist"   to (if (artist == "<unknown>") "" else artist),
                              "duration" to dur,
                              "thumbnail" to thumbB64
                            ))
                          }
                          try { retriever.release() } catch (_: Exception) {}
                        }
                        result.success(audios)
                      } catch (e: Exception) {
                        result.error("AUDIO_ERROR", e.message ?: "Unknown error", null)
                      }
                    }

                    // ✅ FIX-PHOTOS: مكتبة الصور — MediaStore.Images
                    "getDeviceImages" -> {
                      try {
                        val images = mutableListOf<Map<String, Any?>>()
                        val projection = arrayOf(
                          MediaStore.Images.Media._ID,
                          MediaStore.Images.Media.DISPLAY_NAME,
                          MediaStore.Images.Media.DATA,
                          MediaStore.Images.Media.DATE_MODIFIED
                        )
                        val sortOrder = "${MediaStore.Images.Media.DATE_MODIFIED} DESC"
                        val cursor: Cursor? = contentResolver.query(
                          MediaStore.Images.Media.EXTERNAL_CONTENT_URI,
                          projection, null, null, sortOrder
                        )
                        cursor?.use { c ->
                          val idCol   = c.getColumnIndexOrThrow(MediaStore.Images.Media._ID)
                          val nameCol = c.getColumnIndexOrThrow(MediaStore.Images.Media.DISPLAY_NAME)
                          val dataCol = c.getColumnIndexOrThrow(MediaStore.Images.Media.DATA)
                          val dateCol = c.getColumnIndexOrThrow(MediaStore.Images.Media.DATE_MODIFIED)
                          while (c.moveToNext() && images.size < 500) {
                            val id       = c.getLong(idCol)
                            val name     = c.getString(nameCol) ?: "Image"
                            val filePath = c.getString(dataCol) ?: ""
                            val dateMod  = c.getLong(dateCol)
                            if (filePath.isEmpty() || !File(filePath).exists()) continue
                            val imgUri = Uri.withAppendedPath(
                              MediaStore.Images.Media.EXTERNAL_CONTENT_URI, id.toString()
                            )
                            var thumbB64 = ""
                            try {
                              val bmp: Bitmap? = if (Build.VERSION.SDK_INT >= 29) {
                                contentResolver.loadThumbnail(imgUri, android.util.Size(160, 160), null)
                              } else {
                                @Suppress("DEPRECATION")
                                MediaStore.Images.Thumbnails.getThumbnail(
                                  contentResolver, id, MediaStore.Images.Thumbnails.MINI_KIND, null
                                )
                              }
                              if (bmp != null) {
                                val bos = ByteArrayOutputStream()
                                bmp.compress(Bitmap.CompressFormat.JPEG, 65, bos)
                                thumbB64 = "data:image/jpeg;base64," +
                                  Base64.encodeToString(bos.toByteArray(), Base64.NO_WRAP)
                                bmp.recycle()
                              }
                            } catch (_: Exception) {}

                            images.add(mapOf(
                              "filePath"  to filePath,
                              "title"     to name.substringBeforeLast('.'),
                              "dateAdded" to dateMod,
                              "thumbnail" to thumbB64
                            ))
                          }
                        }
                        result.success(images)
                      } catch (e: Exception) {
                        result.error("IMAGE_ERROR", e.message ?: "Unknown error", null)
                      }
                    }

                    // ✅ FIX-DELETE: حذف فعلي من الجهاز — يطلب موافقة المستخدم على
                    // أندرويد 10/11+ زي ما النظام بيتطلب لحماية ملفات المستخدم
                    "deleteDeviceFile" -> {
                      val filePath = call.argument<String>("filePath") ?: ""
                      try {
                        val uri = getMediaStoreUri(filePath)
                        if (uri == null) {
                          result.error("NOT_FOUND", "File not found in MediaStore", null)
                          return@setMethodCallHandler
                        }
                        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                          pendingDeleteResult = result
                          val pi = MediaStore.createDeleteRequest(contentResolver, listOf(uri))
                          startIntentSenderForResult(pi.intentSender, DELETE_REQUEST_CODE, null, 0, 0, 0)
                        } else {
                          try {
                            contentResolver.delete(uri, null, null)
                            result.success("deleted")
                          } catch (se: SecurityException) {
                            if (Build.VERSION.SDK_INT == Build.VERSION_CODES.Q && se is RecoverableSecurityException) {
                              pendingDeleteResult = result
                              startIntentSenderForResult(
                                se.userAction.actionIntent.intentSender, DELETE_REQUEST_CODE, null, 0, 0, 0
                              )
                            } else {
                              result.error("DELETE_ERROR", se.message ?: "Permission denied", null)
                            }
                          }
                        }
                      } catch (e: Exception) {
                        result.error("DELETE_ERROR", e.message ?: "Unknown error", null)
                      }
                    }

                    // ✅ FIX-SHARE: مشاركة فيديو/صوت/صورة لتطبيقات أخرى عبر content:// URI
                    "shareDeviceFile" -> {
                      val filePath = call.argument<String>("filePath") ?: ""
                      val mimeType = call.argument<String>("mimeType") ?: "*/*"
                      try {
                        val uri = getMediaStoreUri(filePath)
                        if (uri == null) {
                          result.error("NOT_FOUND", "File not found in MediaStore", null)
                          return@setMethodCallHandler
                        }
                        val shareIntent = Intent(Intent.ACTION_SEND).apply {
                          type = mimeType
                          putExtra(Intent.EXTRA_STREAM, uri)
                          addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION)
                          addFlags(Intent.FLAG_ACTIVITY_NEW_TASK)
                        }
                        startActivity(Intent.createChooser(shareIntent, "Share"))
                        result.success("shared")
                      } catch (e: Exception) {
                        result.error("SHARE_ERROR", e.message ?: "Unknown error", null)
                      }
                    }

                    // ✅ FIX-PIP: Native Android Picture-in-Picture
                    "enterPiP" -> {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                        try {
                          val params = PictureInPictureParams.Builder()
                            .setAspectRatio(Rational(16, 9))
                            .build()
                          enterPictureInPictureMode(params)
                          result.success("entered")
                        } catch (e: Exception) {
                          result.error("PIP_ERROR", e.message ?: "Unknown error", null)
                        }
                      } else {
                        result.error("NOT_SUPPORTED", "PiP requires Android 8+", null)
                      }
                    }

                    // ✅ FIX-SHARE: الـ Dart بيسحب بيانات المشاركة دي مرة واحدة بعد ما يفتح
                    "getPendingShare" -> {
                      result.success(pendingShare)
                      pendingShare = null
                    }

                    else -> result.notImplemented()
                  }
                }
            }

            // ✅ FIX-PIP: نبلّغ الـ WebView لما يدخل/يخرج من PiP mode
            // عشان الموقع يقدر يكيّف الـ UI (يخفي controls مثلاً)
            override fun onPictureInPictureModeChanged(
              isInPiP: Boolean, newConfig: Configuration
            ) {
              super.onPictureInPictureModeChanged(isInPiP, newConfig)
              flutterEngine?.dartExecutor?.binaryMessenger?.let { messenger ->
                MethodChannel(messenger, "titan_download")
                  .invokeMethod("onPiPChanged", isInPiP)
              }
            }
          }
          KOTLIN

          sed -i "s/APP_SLUG_PLACEHOLDER/$APP_SLUG/g" "$PKG_PATH/MainActivity.kt"

      # ── Step 7: Replace placeholders ────────────────────────────────────────
      - name: Replace Template Variables
        if: env.BUILD_TYPE == 'webview' || env.BUILD_TYPE == '' || !env.BUILD_TYPE
        run: |
          APP_SLUG=${{ env.APP_SLUG }}
          APP_URL="${{ github.event.inputs.app_url }}"
          APP_NAME="${{ github.event.inputs.app_name }}"
          LOC="${{ github.event.inputs.enable_location }}"
          NOTIF="${{ github.event.inputs.enable_notifications }}"
          CAM="${{ github.event.inputs.enable_camera }}"
          STOR="${{ github.event.inputs.enable_storage }}"

          URL_ESCAPED=$(printf '%s' "$APP_URL" | sed 's/|/\|/g')

          sed -i "s|PLACEHOLDER_URL|$URL_ESCAPED|g"           "$APP_SLUG/lib/main.dart"
          sed -i "s|PLACEHOLDER_NAME|$APP_NAME|g"             "$APP_SLUG/lib/main.dart"
          sed -i "s|PLACEHOLDER_LOCATION|$LOC|g"              "$APP_SLUG/lib/main.dart"
          sed -i "s|PLACEHOLDER_NOTIFICATIONS|$NOTIF|g"       "$APP_SLUG/lib/main.dart"
          sed -i "s|PLACEHOLDER_CAMERA|$CAM|g"                "$APP_SLUG/lib/main.dart"
          sed -i "s|PLACEHOLDER_STORAGE|$STOR|g"              "$APP_SLUG/lib/main.dart"

      # ✅ FIX-NOTIF: نستبدل العلامات بكود FCM حقيقي بس لو google_services_json
      # متوفر — غير كذا العلامات تفضل تعليقات عادية بلا أي تأثير على البناء
      - name: Inject Firebase Messaging Code (optional)
        if: env.FCM_ENABLED == 'true'
        run: |
          APP_SLUG=${{ env.APP_SLUG }}
          python3 - "$APP_SLUG/lib/main.dart" << 'PYEOF'
          import sys
          filepath = sys.argv[1]
          content = open(filepath, encoding='utf-8').read()

          content = content.replace(
              "// FCM_IMPORTS_PLACEHOLDER",
              "import 'package:firebase_core/firebase_core.dart';\n"
              "          import 'package:firebase_messaging/firebase_messaging.dart';"
          )

          content = content.replace(
              "// FCM_BACKGROUND_HANDLER_PLACEHOLDER",
              "@pragma('vm:entry-point')\n"
              "          Future<void> _firebaseMessagingBackgroundHandler(RemoteMessage message) async {\n"
              "            // ✅ أندرويد بيعرض إشعار النظام تلقائيًا للرسائل اللي فيها\n"
              "            // notification payload حتى لو التطبيق مقفول تمامًا — مفيش\n"
              "            // كود مطلوب هنا للحالة الشائعة دي. الهاندلر ده نقطة توسعة\n"
              "            // لمعالجة رسائل data-only مستقبلًا لو احتجتوا.\n"
              "            debugPrint('FCM background message: ' + message.messageId.toString());\n"
              "          }"
          )

          content = content.replace(
              "// FCM_INIT_PLACEHOLDER",
              "try {\n"
              "              await Firebase.initializeApp();\n"
              "              FirebaseMessaging.onBackgroundMessage(_firebaseMessagingBackgroundHandler);\n"
              "            } catch (e) { debugPrint('Firebase init skipped: $e'); }"
          )

          content = content.replace(
              "// FCM_INIT_LISTENERS_PLACEHOLDER",
              "_setupFcmListeners(); // ✅ FIX-NOTIF: إشعارات حقيقية حتى لو التطبيق مقفول"
          )

          content = content.replace(
              "// FCM_PUSH_TOKEN_PLACEHOLDER",
              "_pushFcmTokenToSite(); // ✅ FIX-NOTIF: نبعت التوكن للموقع يحفظه في الباك إند"
          )

          # الدوال الفعلية بتتحط آخر الكلاس — قبل آخر قوس قفل بتاع _WebViewPageState
          extra_methods = '''
            // ✅ FIX-NOTIF: رسائل وارِدة والتطبيق مفتوح — أندرويد ما يعرضهاش
            // تلقائيًا في هذه الحالة، فلازم نعرضها بأنفسنا عبر نفس قناة
            // الإشعارات المستخدمة في باقي التطبيق
            void _setupFcmListeners() {
              try {
                FirebaseMessaging.instance.requestPermission(alert: true, badge: true, sound: true);
                FirebaseMessaging.onMessage.listen((RemoteMessage message) async {
                  final title = message.notification?.title ?? message.data['title'] ?? kAppName;
                  final body  = message.notification?.body  ?? message.data['body']  ?? '';
                  if (title.isEmpty && body.isEmpty) return;
                  try {
                    const ch = MethodChannel('titan_download');
                    await ch.invokeMethod('showNotification', {'title': title, 'body': body});
                  } catch (_) {}
                });
              } catch (e) { debugPrint('_setupFcmListeners: $e'); }
            }

            // ✅ FIX-NOTIF: نبعت توكن FCM الأصلي للموقع — الباك إند بتاعكم محتاج
            // يحفظه بجانب push token الويب العادي عشان يقدر يبعت إشعارات
            // حقيقية تطلع حتى والتطبيق مقفول تمامًا (عبر Firebase Admin SDK)
            Future<void> _pushFcmTokenToSite() async {
              try {
                final token = await FirebaseMessaging.instance.getToken();
                if (token == null || token.isEmpty) return;
                await _ctrl?.evaluateJavascript(source:
                    "window.titanNativeFcmToken = '$token';"
                    "window.dispatchEvent(new CustomEvent('titanFcmToken', {detail:'$token'}));");
              } catch (e) { debugPrint('_pushFcmTokenToSite: $e'); }
            }
          '''

          # الدوال الفعلية بتتحط آخر الكلاس — قبل آخر قوس قفل في نهاية الملف
          # تمامًا (قوس الكلاس)، مش أي قوس عشوائي قبله
          import re
          m = re.search(r'\n(?P<indent>[ \t]*)\}\s*$', content)
          if m:
              indent = m.group('indent')
              insert_at = m.start()
              content = content[:insert_at] + '\n' + extra_methods + content[insert_at:]
          else:
              print("⚠️ couldn't locate class-closing brace — skipping method injection")

          open(filepath, 'w', encoding='utf-8').write(content)
          print("✅ Firebase Messaging code injected")
          PYEOF

      # ── Step 8: App Icon handling ───────────────────────────────────────────
      - name: Handle App Icon
        if: env.BUILD_TYPE == 'webview' || env.BUILD_TYPE == '' || !env.BUILD_TYPE
        run: |
          APP_SLUG=${{ env.APP_SLUG }}
          ICON_URL="${{ github.event.inputs.icon_url }}"

          if [ -n "$ICON_URL" ] && [ "$ICON_URL" != "" ]; then
            curl -L -o /tmp/app_icon.png "$ICON_URL" 2>/dev/null || true
            if [ -f /tmp/app_icon.png ] && [ -s /tmp/app_icon.png ]; then
              sudo apt-get install -y imagemagick 2>/dev/null | tail -1
              for size in 48 72 96 144 192; do
                case $size in
                  48)  dir="mipmap-mdpi"    ;;
                  72)  dir="mipmap-hdpi"    ;;
                  96)  dir="mipmap-xhdpi"   ;;
                  144) dir="mipmap-xxhdpi"  ;;
                  192) dir="mipmap-xxxhdpi" ;;
                esac
                mkdir -p "$APP_SLUG/android/app/src/main/res/$dir"
                convert /tmp/app_icon.png -resize ${size}x${size} \
                  "$APP_SLUG/android/app/src/main/res/$dir/ic_launcher.png" 2>/dev/null || true
                convert /tmp/app_icon.png -resize ${size}x${size} -alpha on \
                  "$APP_SLUG/android/app/src/main/res/$dir/ic_launcher_round.png" 2>/dev/null || true
              done
              echo "✅ Icon applied"
            fi
          fi

      # ── Step 9: Patch ProGuard ──────────────────────────────────────────────
      - name: Patch ProGuard
        if: env.BUILD_TYPE == 'webview' || env.BUILD_TYPE == '' || !env.BUILD_TYPE
        run: |
          find ~/.pub-cache/hosted/pub.dev/ -name "build.gradle" \
            -print0 | xargs -0 sed -i "s/getDefaultProguardFile('proguard-android.txt')/getDefaultProguardFile('proguard-android-optimize.txt')/g" 2>/dev/null || true

      # ── Step 10: Build APK ──────────────────────────────────────────────────
      - name: Build APK
        if: env.BUILD_TYPE == 'webview' || env.BUILD_TYPE == '' || !env.BUILD_TYPE
        run: |
          cd "${{ env.APP_SLUG }}"
          flutter build apk --release \
            --build-name="${{ env.RESOLVED_VERSION_NAME }}" \
            --build-number="${{ env.RESOLVED_VERSION_CODE }}"

      # ── Step 11: Build AAB ──────────────────────────────────────────────────
      - name: Build AAB
        if: env.BUILD_TYPE == 'webview' || env.BUILD_TYPE == '' || !env.BUILD_TYPE
        run: |
          cd "${{ env.APP_SLUG }}"
          flutter build appbundle --release \
            --build-name="${{ env.RESOLVED_VERSION_NAME }}" \
            --build-number="${{ env.RESOLVED_VERSION_CODE }}"

      # ── Step 12: Generate Keystore & Sign ───────────────────────────────────
      # ✅ FIX-UPDATE: لو فيه keystore سابق لنفس التطبيق نستخدمه بنفس التوقيع
      # (شرط أساسي عشان أندرويد يقبل التحديث) — غير كذا نولّد واحد جديد ونحفظه
      - name: Generate Keystore and Sign APK
        if: env.BUILD_TYPE == 'webview' || env.BUILD_TYPE == '' || !env.BUILD_TYPE
        run: |
          APP_SLUG=${{ env.APP_SLUG }}
          APP_NAME="${{ github.event.inputs.app_name }}"

          if [ "${{ env.KEYSTORE_REUSED }}" = "true" ] && [ -f /tmp/keystore_cache/release.jks ]; then
            echo "♻️ Reusing existing keystore — this build will install as an UPDATE"
            cp /tmp/keystore_cache/release.jks /tmp/release.jks
            ALIAS="${{ env.KEY_ALIAS }}"
            KS_PASS="${{ env.KS_PASS }}"
            KEY_PASS="${{ env.KEY_PASS }}"
          else
            echo "🆕 No previous keystore for '$APP_SLUG' — generating one (will persist for future updates)"
            ALIAS="titan-${APP_SLUG}"
            KS_PASS="$(openssl rand -hex 16)"
            KEY_PASS="$KS_PASS"

            keytool -genkey -v \
              -keystore /tmp/release.jks \
              -storetype PKCS12 \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias "$ALIAS" \
              -storepass "$KS_PASS" \
              -dname "CN=$APP_NAME, OU=App, O=Titan, L=City, S=State, C=US"
          fi

          BUILD_TOOLS=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -1)

          $BUILD_TOOLS/apksigner sign \
            --ks /tmp/release.jks \
            --ks-key-alias "$ALIAS" \
            --ks-pass "pass:$KS_PASS" \
            --key-pass "pass:$KEY_PASS" \
            "$APP_SLUG/build/app/outputs/flutter-apk/app-release.apk"

          echo "KEY_ALIAS=$ALIAS"   >> $GITHUB_ENV
          echo "KS_PASS=$KS_PASS"   >> $GITHUB_ENV
          echo "KEY_PASS=$KEY_PASS"  >> $GITHUB_ENV
          cp /tmp/release.jks /tmp/release-keystore.jks

      # ✅ FIX-UPDATE: نحفظ الـ keystore + رقم النسخة في HF Dataset عشان
      # البناء الجاي لنفس التطبيق يلاقيهم ويقدر يتثبّت كتحديث بدل ما يتعارض
      - name: Persist Keystore & Version for Future Updates
        if: env.BUILD_TYPE == 'webview' || env.BUILD_TYPE == '' || !env.BUILD_TYPE
        run: |
          python3 - << 'PYEOF'
          import json, os
          from huggingface_hub import HfApi

          api = HfApi()
          app_slug   = os.environ["APP_SLUG"]
          hf_dataset = "${{ github.event.inputs.hf_dataset }}"
          hf_token   = "${{ github.event.inputs.hf_token }}"

          meta = {
              "key_alias":    "${{ env.KEY_ALIAS }}",
              "ks_pass":      "${{ env.KS_PASS }}",
              "key_pass":     "${{ env.KEY_PASS }}",
              "version_name": "${{ env.RESOLVED_VERSION_NAME }}",
              "version_code": "${{ env.RESOLVED_VERSION_CODE }}",
          }
          with open("/tmp/keystore_meta.json", "w") as f:
              json.dump(meta, f)

          try:
              api.upload_file(
                  path_or_fileobj="/tmp/release-keystore.jks",
                  path_in_repo=f"keystores/{app_slug}.jks",
                  repo_id=hf_dataset, repo_type="dataset", token=hf_token,
              )
              api.upload_file(
                  path_or_fileobj="/tmp/keystore_meta.json",
                  path_in_repo=f"keystores/{app_slug}.json",
                  repo_id=hf_dataset, repo_type="dataset", token=hf_token,
              )
              print(f"✅ Keystore + version persisted for '{app_slug}' — next build will update cleanly")
          except Exception as e:
              print(f"⚠️ Could not persist keystore (future builds will start fresh): {e}")
          PYEOF

      # ── Step 13: Create Release Package ─────────────────────────────────────
      - name: Create Release Package
        run: |
          APP_SLUG=${{ env.APP_SLUG }}
          APP_NAME="${{ github.event.inputs.app_name }}"
          APP_URL="${{ github.event.inputs.app_url }}"
          TRACKING="${{ github.event.inputs.tracking_id }}"
          ALIAS="${{ env.KEY_ALIAS }}"
          KS_PASS="${{ env.KS_PASS }}"
          KEY_PASS="${{ env.KEY_PASS }}"
          BUILD_DATE=$(date '+%Y-%m-%d %H:%M UTC')

          mkdir -p /tmp/release-package
          BUILD_TYPE="${{ env.BUILD_TYPE }}"
          if [ "$BUILD_TYPE" = "pwa_twa" ] || [ "$BUILD_TYPE" = "twa_native" ]; then
            TWA_APK="${{ env.TWA_APK }}"
            TWA_AAB="${{ env.TWA_AAB }}"
            [ -n "$TWA_APK" ] && [ -f "$TWA_APK" ] && cp "$TWA_APK" "/tmp/release-package/${APP_SLUG}-twa-release.apk" || echo "⚠️ TWA APK not found"
            [ -n "$TWA_AAB" ] && [ -f "$TWA_AAB" ] && cp "$TWA_AAB" "/tmp/release-package/${APP_SLUG}-twa-release.aab" || echo "ℹ️ TWA AAB not built"
            cp /tmp/twa-project/android.keystore "/tmp/release-package/release-keystore.jks" 2>/dev/null || true
            BUILD_LABEL="TWA (Trusted Web Activity — Chrome Engine)"
          else
            cp "$APP_SLUG/build/app/outputs/flutter-apk/app-release.apk" "/tmp/release-package/${APP_SLUG}-release.apk" 2>/dev/null || true
            cp "$APP_SLUG/build/app/outputs/bundle/release/app-release.aab" "/tmp/release-package/${APP_SLUG}-release.aab" 2>/dev/null || true
            cp /tmp/release-keystore.jks "/tmp/release-package/release-keystore.jks" 2>/dev/null || true
            BUILD_LABEL="WebView (Flutter Engine)"
          fi

          cat > "/tmp/release-package/README.txt" << 'README'
          ╔══════════════════════════════════════════════════╗
          ║         TITAN WEBVIEW APP — RELEASE PACKAGE      ║
          ╚══════════════════════════════════════════════════╝

          App Name   : $APP_NAME
          App URL    : $APP_URL
          Build Date : $BUILD_DATE
          Tracking ID: $TRACKING
          Build Type : $BUILD_LABEL

          ── FILES ──────────────────────────────────────────
          ${APP_SLUG}-release.apk  → Install directly on Android
          ${APP_SLUG}-release.aab  → Upload to Google Play Store
          release-keystore.jks     → Keep this safe! Needed for future updates.

          ── KEYSTORE INFO (KEEP PRIVATE!) ──────────────────
          Key Alias      : $ALIAS
          Store Password : $KS_PASS
          Key Password   : $KEY_PASS
          README

          cd /tmp
          zip -r "release-package-${TRACKING}.zip" release-package/
          echo "RELEASE_ZIP=/tmp/release-package-${TRACKING}.zip" >> $GITHUB_ENV

      # ── Step 14: Upload to HF Dataset CDN ───────────────────────────────────
      - name: Upload Release Package to HF Dataset
        env:
          TRACKING: ${{ github.event.inputs.tracking_id }}
          HF_TOKEN: ${{ github.event.inputs.hf_token }}
          HF_DATASET: ${{ github.event.inputs.hf_dataset }}
          RELEASE_ZIP: /tmp/release-package-${{ github.event.inputs.tracking_id }}.zip
        run: |
          pip install huggingface_hub -q

          DOWNLOAD_URL=$(python3 - << 'PYEOF'
          import sys, os
          from huggingface_hub import HfApi

          api = HfApi()
          tracking = os.environ.get("TRACKING")
          hf_dataset = os.environ.get("HF_DATASET")
          hf_token = os.environ.get("HF_TOKEN")
          release_zip = os.environ.get("RELEASE_ZIP")

          path_in_repo = f"builds/{tracking}/release-package.zip"

          try:
              url = api.upload_file(
                  path_or_fileobj=release_zip,
                  path_in_repo=path_in_repo,
                  repo_id=hf_dataset,
                  repo_type="dataset",
                  token=hf_token,
              )
              print(f"https://huggingface.co/{hf_dataset}/resolve/main/{path_in_repo}")
          except Exception as e:
              sys.stderr.write(f"HF upload error: {e}\n")
              print("")
          PYEOF
          )

          if [ -n "$DOWNLOAD_URL" ]; then
            echo "HF_DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV
            echo "✅ Uploaded: $DOWNLOAD_URL"
          else
            echo "❌ HF upload failed"
            echo "HF_DOWNLOAD_URL=" >> $GITHUB_ENV
          fi

      # ── Step 15: Upload GitHub Artifact ─────────────────────────────────────
      - name: Upload GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webview-release-package
          path: /tmp/release-package-${{ github.event.inputs.tracking_id }}.zip
          retention-days: 30

      # ── Step 16: Webhook callback ───────────────────────────────────────────
      - name: Send webhook callback
        if: always()
        run: |
          STATUS="success"
          if [ "${{ job.status }}" != "success" ]; then STATUS="failure"; fi

          DOWNLOAD_URL="${{ env.HF_DOWNLOAD_URL }}"
          TRACKING="${{ github.event.inputs.tracking_id }}"

          curl -s -X POST "${{ github.event.inputs.webhook_url }}?tracking_id=${TRACKING}" \
            -H "Content-Type: application/json" \
            -H "x-github-event: workflow_run" \
            -d "{
              \"action\": \"completed\",
              \"workflow_run\": {
                \"status\": \"completed\",
                \"conclusion\": \"$STATUS\",
                \"html_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
                \"artifacts_url\": \"${{ github.api_url }}/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts\",
                \"head_branch\": \"main\",
                \"hf_download_url\": \"$DOWNLOAD_URL\"
              },
              \"repository\": { \"full_name\": \"${{ github.repository }}\" }
            }"
