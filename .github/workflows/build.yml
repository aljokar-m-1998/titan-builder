name: Titan WebView Builder Pro v3

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'URL of the app'
        required: true
      app_name:
        description: 'Name of the app'
        required: true
      icon_url:
        description: 'Icon URL (Optional)'
        required: false
        default: ''
      tracking_id:
        description: 'Tracking ID'
        required: true
      webhook_url:
        description: 'Webhook URL'
        required: true
      enable_location:
        description: 'Enable Location Permission'
        required: false
        default: 'false'
      enable_notifications:
        description: 'Enable Notifications Permission'
        required: false
        default: 'false'
      enable_camera:
        description: 'Enable Camera & Microphone Permission'
        required: false
        default: 'true'
      enable_storage:
        description: 'Enable Storage Permission'
        required: false
        default: 'true'
      hf_token:
        description: 'HF Token for CDN upload'
        required: true
      hf_dataset:
        description: 'HF Dataset repo (owner/name)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # ── Step 1: Create Flutter project ───────────────────────────────────────
      - name: Create Flutter WebView project
        run: |
          APP_SLUG=$(echo "${{ github.event.inputs.app_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/_/g' | sed 's/__*/_/g' | sed 's/^_//;s/_$//')
          echo "APP_SLUG=$APP_SLUG" >> $GITHUB_ENV

          flutter create --platforms=android --project-name "$APP_SLUG" --org com.titan "$APP_SLUG"

          cd "$APP_SLUG"
          flutter pub add flutter_inappwebview connectivity_plus permission_handler url_launcher shared_preferences path_provider device_info_plus just_audio audio_service

          # ── Enable Core Library Desugaring + minSdk ───────────────────────────
          GRADLE=$(find android/app -maxdepth 1 -name "build.gradle*" | head -1)
          if [ -z "$GRADLE" ]; then
            echo "❌ build.gradle not found!" && exit 1
          fi
          echo "✅ Patching $GRADLE"

          python3 - "$GRADLE" << 'PYEOF'
          import re, sys
          filepath = sys.argv[1]
          content = open(filepath).read()

          content = re.sub(
              r'(compileOptions\s*\{)',
              "\\1\n        isCoreLibraryDesugaringEnabled = true",
              content
          )

          dep_line = 'coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")'
          if re.search(r'^\s*dependencies\s*\{', content, re.MULTILINE):
              content = re.sub(
                  r'(\s*dependencies\s*\{)',
                  "\\1\n    " + dep_line,
                  content, count=1
              )
          else:
              content = content.rstrip() + f"\n\ndependencies {{\n    {dep_line}\n}}\n"

          if 'minSdk' not in content and 'minSdkVersion' not in content:
              content = re.sub(
                  r'(defaultConfig\s*\{)',
                  "\\1\n        minSdk = 21\n        targetSdk = 34",
                  content, count=1
              )

          open(filepath, 'w').write(content)
          print("✅ Gradle patched successfully")
          PYEOF

      # ── Step 2: AndroidManifest ───────────────────────────────────────────────
      - name: Inject Permissions and Manifest Settings
        env:
          ENABLE_CAMERA: ${{ github.event.inputs.enable_camera }}
          ENABLE_STORAGE: ${{ github.event.inputs.enable_storage }}
          ENABLE_LOCATION: ${{ github.event.inputs.enable_location }}
          ENABLE_NOTIFICATIONS: ${{ github.event.inputs.enable_notifications }}
          APP_NAME: ${{ github.event.inputs.app_name }}
        run: |
          APP_SLUG=${{ env.APP_SLUG }}
          MANIFEST="$APP_SLUG/android/app/src/main/AndroidManifest.xml"

          python3 - "$MANIFEST" << 'PYEOF'
          import sys, os
          filepath = sys.argv[1]
          with open(filepath, 'r') as f:
              content = f.read()

          permissions = [
              "android.permission.INTERNET",
              "android.permission.ACCESS_NETWORK_STATE",
              "android.permission.ACCESS_WIFI_STATE",
              "android.permission.CHANGE_NETWORK_STATE",
              "android.permission.DOWNLOAD_WITHOUT_NOTIFICATION",
              "android.permission.WAKE_LOCK",
              "android.permission.FOREGROUND_SERVICE",
              "android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK",
              "android.permission.MANAGE_EXTERNAL_STORAGE",
          ]

          if os.environ.get("ENABLE_CAMERA") == "true":
              permissions.extend([
                  "android.permission.CAMERA",
                  "android.permission.RECORD_AUDIO",
                  "android.permission.MODIFY_AUDIO_SETTINGS",
              ])
              feature = '<uses-feature android:name="android.hardware.camera" android:required="false"/>'
              if feature not in content:
                  content = content.replace('<application', feature + '\n    <application', 1)

          if os.environ.get("ENABLE_STORAGE") == "true":
              permissions.extend([
                  "android.permission.READ_EXTERNAL_STORAGE",
                  "android.permission.WRITE_EXTERNAL_STORAGE",
                  "android.permission.READ_MEDIA_IMAGES",
                  "android.permission.READ_MEDIA_VIDEO",
                  "android.permission.READ_MEDIA_AUDIO",
              ])

          if os.environ.get("ENABLE_LOCATION") == "true":
              permissions.extend([
                  "android.permission.ACCESS_FINE_LOCATION",
                  "android.permission.ACCESS_COARSE_LOCATION",
              ])

          if os.environ.get("ENABLE_NOTIFICATIONS") == "true":
              permissions.extend([
                  "android.permission.POST_NOTIFICATIONS",
                  "android.permission.VIBRATE",
              ])

          perms_xml = '\n'.join([f'    <uses-permission android:name="{p}"/>' for p in permissions])

          content = content.replace(
              '<application',
              perms_xml + '\n    <application android:usesCleartextTraffic="true" android:hardwareAccelerated="true" android:largeHeap="true" android:requestLegacyExternalStorage="true"',
              1
          )

          app_name = os.environ.get("APP_NAME", "Flutter App")
          content = content.replace('android:label="flutter_app"', f'android:label="{app_name}"')

          audio_service = '''
                  <service android:name="com.ryanheise.audioservice.AudioService"
                      android:exported="true"
                      android:foregroundServiceType="mediaPlayback">
                      <intent-filter>
                          <action android:name="android.media.browse.MediaBrowserService"/>
                      </intent-filter>
                  </service>
                  <receiver android:name="com.ryanheise.audioservice.MediaButtonReceiver"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MEDIA_BUTTON"/>
                      </intent-filter>
                  </receiver>
          '''
          if 'com.ryanheise.audioservice.AudioService' not in content:
              content = content.replace('</application>', audio_service + '    </application>')

          provider = '''    <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths"/>
                  </provider>
          '''
          if 'androidx.core.content.FileProvider' not in content:
              content = content.replace('</application>', provider + '</application>')

          with open(filepath, 'w') as f:
              f.write(content)
          print("✅ Manifest patched")
          PYEOF

          # file_paths.xml
          mkdir -p "$APP_SLUG/android/app/src/main/res/xml"
          cat > "$APP_SLUG/android/app/src/main/res/xml/file_paths.xml" << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <root-path name="root" path="."/>
              <external-path name="external_files" path="."/>
              <external-cache-path name="external_cache" path="."/>
              <files-path name="internal_files" path="."/>
              <cache-path name="cache" path="."/>
              <external-files-path name="external_app_files" path="."/>
          </paths>
          XML

      # ── Step 3a: main.dart (part 1/2) ──────────────────────────────────
      - name: Write main.dart part 1
        env:
          APP_SLUG: ${{ env.APP_SLUG }}
        run: |
          mkdir -p "$APP_SLUG/lib"
          cat > "$APP_SLUG/lib/main.dart" << 'DART'
          import 'dart:io';
          import 'dart:convert';
          import 'package:path_provider/path_provider.dart';
          import 'package:flutter/material.dart';
          import 'package:flutter/services.dart';
          import 'package:flutter_inappwebview/flutter_inappwebview.dart';
          import 'package:connectivity_plus/connectivity_plus.dart';
          import 'package:permission_handler/permission_handler.dart';
          import 'package:url_launcher/url_launcher.dart';
          import 'package:shared_preferences/shared_preferences.dart';
          import 'package:device_info_plus/device_info_plus.dart';
          import 'package:audio_service/audio_service.dart';
          import 'package:just_audio/just_audio.dart';

          const String kAppUrl  = 'PLACEHOLDER_URL';
          const String kAppName = 'PLACEHOLDER_NAME';
          const bool   kEnableLocation      = PLACEHOLDER_LOCATION;
          const bool   kEnableNotifications = PLACEHOLDER_NOTIFICATIONS;
          const bool   kEnableCamera        = PLACEHOLDER_CAMERA;
          const bool   kEnableStorage       = PLACEHOLDER_STORAGE;

          const String kUserAgent =
            'Mozilla/5.0 (Linux; Android 14; Pixel 8 Pro Build/UQ1A.240105.004) '
            'AppleWebKit/537.36 (KHTML, like Gecko) '
            'Chrome/124.0.6367.82 Mobile Safari/537.36';

          class TitanAudioHandler extends BaseAudioHandler with QueueHandler, SeekHandler {
            @override
            Future<void> play() async {
              updatePlaybackState(true);
            }
            @override
            Future<void> pause() async {
              updatePlaybackState(false);
            }
            @override
            Future<void> stop() async {
              playbackState.add(playbackState.value.copyWith(
                playing: false,
                processingState: AudioProcessingState.idle,
                controls: [],
              ));
            }
            @override
            Future<void> skipToNext() async {}
            @override
            Future<void> skipToPrevious() async {}

            void setNowPlaying(String title, String artUrl) {
              Uri? art;
              if (artUrl.isNotEmpty) {
                try { art = Uri.parse(artUrl); } catch (_) {}
              }
              mediaItem.add(MediaItem(
                id:      'webview_media_${DateTime.now().millisecondsSinceEpoch}',
                title:   title.isNotEmpty ? title : kAppName,
                album:   kAppName,
                artUri:  art,
                playable: true,
              ));
              // Ensure playback state is ready so notification shows
              if (playbackState.value.processingState == AudioProcessingState.idle) {
                updatePlaybackState(true);
              }
            }

            void updatePlaybackState(bool playing) {
              playbackState.add(playbackState.value.copyWith(
                playing: playing,
                controls: [
                  playing ? MediaControl.pause : MediaControl.play,
                ],
                systemActions: const {
                  MediaAction.play,
                  MediaAction.pause,
                  MediaAction.stop,
                },
                androidCompactActionIndices: const [0],
                processingState: AudioProcessingState.ready,
                updateTime: DateTime.now(),
              ));
            }
          }

          TitanAudioHandler? _audioHandler;

          void main() async {
            WidgetsFlutterBinding.ensureInitialized();

            try {
              _audioHandler = await AudioService.init(
                builder: () => TitanAudioHandler(),
                config: const AudioServiceConfig(
                  androidNotificationChannelId:   'com.titan.webview.media',
                  androidNotificationChannelName: 'Titan Media',
                  androidNotificationIcon:        'mipmap/ic_launcher',
                  androidShowNotificationBadge:   true,
                  androidNotificationOngoing:     false,
                  androidStopForegroundOnPause:   true,
                  notificationColor:              Color(0xFF7c3aed),
                ),
              );
            } catch (e) {
              debugPrint('AudioService init skipped/failed: \$e');
            }

            SystemChrome.setEnabledSystemUIMode(SystemUiMode.edgeToEdge);
            SystemChrome.setPreferredOrientations([
              DeviceOrientation.portraitUp,
              DeviceOrientation.portraitDown,
              DeviceOrientation.landscapeLeft,
              DeviceOrientation.landscapeRight,
            ]);
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) => MaterialApp(
              title: kAppName,
              debugShowCheckedModeBanner: false,
              theme: ThemeData(useMaterial3: true, colorScheme: ColorScheme.fromSeed(seedColor: Colors.blue)),
              home: const WebViewPage(),
            );
          }

          class WebViewPage extends StatefulWidget {
            const WebViewPage({super.key});

            @override
            State<WebViewPage> createState() => _WebViewPageState();
          }

          class _WebViewPageState extends State<WebViewPage> with WidgetsBindingObserver {
            InAppWebViewController? _ctrl;
            bool _loading    = true;
            bool _offline    = false;
            bool _error      = false;
            bool _fullscreen = false;

            @override
            void initState() {
              super.initState();
              WidgetsBinding.instance.addObserver(this);
              _requestPermissions();
              _checkConnectivity();
              Connectivity().onConnectivityChanged.listen((r) {
                if (!mounted) return;
                final wasOffline = _offline;
                setState(() => _offline = r.contains(ConnectivityResult.none));
                if (wasOffline && !_offline && _error) _ctrl?.reload();
              });
            }

            void _setupMediaBridge(InAppWebViewController ctrl) {
              // ── 1. Audio notification bridge ─────────────────────────────────
              ctrl.addJavaScriptHandler(
                handlerName: 'titanMediaUpdate',
                callback: (args) {
                  if (args.isEmpty) return;
                  try {
                    final data    = args[0] as Map<String, dynamic>;
                    final playing = data['playing'] as bool? ?? false;
                    final rawTitle = data['title']  as String? ?? '';
                    final title   = rawTitle.isNotEmpty ? rawTitle : kAppName;
                    final artUrl  = data['artUrl']  as String? ?? '';
                    _audioHandler?.setNowPlaying(title, artUrl);
                    _audioHandler?.updatePlaybackState(playing);
                  } catch (_) {}
                },
              );

              // ── 2. Save image/file to device (MediaStore) ────────────────────
              ctrl.addJavaScriptHandler(
                handlerName: 'saveToGallery',
                callback: (args) async {
                  if (args.isEmpty) return 'error';
                  try {
                    final data     = args[0] as Map<String, dynamic>;
                    final b64Data  = data['data']     as String? ?? '';
                    final fileName = data['fileName'] as String?
                        ?? 'Titan_${DateTime.now().millisecondsSinceEpoch}.jpg';
                    if (b64Data.isEmpty) return 'error';
                    final raw   = b64Data.contains(',') ? b64Data.split(',').last : b64Data;
                    final bytes = base64Decode(raw);
                    final tmp   = await _writeTempFile(bytes, fileName);
                    const platform = MethodChannel('titan_download');
                    final result   = await platform.invokeMethod<String>('saveToDownloads', {
                      'sourcePath': tmp,
                      'fileName':   fileName,
                      'mimeType':   _guessMime(fileName),
                    });
                    return result ?? 'error';
                  } catch (e) {
                    debugPrint('saveToGallery error: $e');
                    return 'error';
                  }
                },
              );

              // ── 3. Save arbitrary decrypted file bytes from JS ───────────────
              ctrl.addJavaScriptHandler(
                handlerName: 'saveFileBytes',
                callback: (args) async {
                  if (args.isEmpty) return 'error';
                  try {
                    final data     = args[0] as Map<String, dynamic>;
                    final b64Data  = data['data']     as String? ?? '';
                    final fileName = data['fileName'] as String?
                        ?? 'Titan_${DateTime.now().millisecondsSinceEpoch}';
                    final mimeType = data['mimeType'] as String? ?? _guessMime(fileName);
                    if (b64Data.isEmpty) return 'error';
                    final raw   = b64Data.contains(',') ? b64Data.split(',').last : b64Data;
                    final bytes = base64Decode(raw);
                    final tmp   = await _writeTempFile(bytes, fileName);
                    const platform = MethodChannel('titan_download');
                    final result   = await platform.invokeMethod<String>('saveToDownloads', {
                      'sourcePath': tmp,
                      'fileName':   fileName,
                      'mimeType':   mimeType,
                    });
                    return result ?? 'error';
                  } catch (e) {
                    debugPrint('saveFileBytes error: $e');
                    return 'error';
                  }
                },
              );

              // ── 4. Get device video list for native gallery picker ────────────
              ctrl.addJavaScriptHandler(
                handlerName: 'getNativeVideos',
                callback: (args) async {
                  try {
                    // Request correct permission based on Android version
                    final sdkInt = await _getSdkInt();
                    bool granted = false;
                    if (sdkInt >= 33) {
                      final s = await Permission.videos.request();
                      granted = s.isGranted;
                    } else {
                      final s = await Permission.storage.request();
                      granted = s.isGranted;
                    }
                    if (!granted) return <Map>[];

                    const platform = MethodChannel('titan_download');
                    final result   = await platform.invokeMethod<List>('getDeviceVideos');
                    if (result == null) return <Map>[];
                    return result
                        .map((v) => Map<String, dynamic>.from(v as Map))
                        .where((v) => (v['url'] as String? ?? '').isNotEmpty)
                        .toList();
                  } catch (e) {
                    debugPrint('getNativeVideos error: $e');
                    return <Map>[];
                  }
                },
              );

              // ── Inject JS media observer (picks up tc-media-title correctly) ─
              final jsCode = r"""
              (function(){
                function getTitle(){
                  var el=document.getElementById('tc-media-title');
                  if(el&&el.innerText.trim()) return el.innerText.trim();
                  return document.title||'';
                }
                function notify(el){
                  if(!el) return;
                  var og=document.querySelector('meta[property="og:image"]');
                  window.flutter_inappwebview.callHandler('titanMediaUpdate',{
                    playing:!el.paused,
                    title:getTitle(),
                    artUrl:og?og.getAttribute('content'):''
                  });
                }
                function attach(el){
                  ['play','pause','ended'].forEach(function(ev){
                    el.addEventListener(ev,function(){ notify(el); });
                  });
                }
                document.querySelectorAll('video,audio').forEach(attach);
                new MutationObserver(function(ms){
                  ms.forEach(function(m){
                    m.addedNodes.forEach(function(n){
                      if(n.tagName==='VIDEO'||n.tagName==='AUDIO') attach(n);
                      if(n.querySelectorAll) n.querySelectorAll('video,audio').forEach(attach);
                    });
                  });
                }).observe(document.body,{childList:true,subtree:true});
              })();
              """;
              ctrl.evaluateJavascript(source: jsCode);
            }

            // ── Helper: write bytes to temp, return path ──────────────────────
            Future<String> _writeTempFile(List<int> bytes, String name) async {
              final dir  = await getTemporaryDirectory();
              final file = File('${dir.path}/$name');
              await file.writeAsBytes(bytes, flush: true);
              return file.path;
            }
            @override
            void dispose() {
              WidgetsBinding.instance.removeObserver(this);
              super.dispose();
            }

            Future<void> _requestPermissions() async {
              if (kEnableCamera) {
                await [Permission.camera, Permission.microphone].request();
              }

              if (kEnableLocation) {
                await Permission.locationWhenInUse.request();
              }

              if (kEnableStorage && Platform.isAndroid) {
                final sdkInt = await _getSdkInt();
                if (sdkInt >= 33) {
                  // Android 13+ — granular media permissions
                  await [
                    Permission.photos,
                    Permission.videos,
                    Permission.audio,
                  ].request();
                } else if (sdkInt >= 30) {
                  // Android 11-12 — request MANAGE_EXTERNAL_STORAGE for full Downloads access
                  final manageStatus = await Permission.manageExternalStorage.status;
                  if (!manageStatus.isGranted) {
                    await Permission.manageExternalStorage.request();
                  }
                } else {
                  // Android 10 and below
                  await Permission.storage.request();
                }
              }

              if (kEnableNotifications && Platform.isAndroid) {
                final sdkInt = await _getSdkInt();
                if (sdkInt >= 33) {
                  final status = await Permission.notification.status;
                  if (status.isDenied) {
                    await Permission.notification.request();
                  } else if (status.isPermanentlyDenied) {
                    await openAppSettings();
                  }
                }
              }
            }
          DART

      # ── Step 3b: main.dart (part 2/2) ──────────────────────────────────
      - name: Write main.dart part 2
        env:
          APP_SLUG: ${{ env.APP_SLUG }}
        run: |
          cat >> "$APP_SLUG/lib/main.dart" << 'DART'

            Future<int> _getSdkInt() async {
              try {
                final info = await DeviceInfoPlugin().androidInfo;
                return info.version.sdkInt;
              } catch (_) {
                return 33;
              }
            }

            Future<void> _checkConnectivity() async {
              final r = await Connectivity().checkConnectivity();
              if (mounted) setState(() => _offline = r.contains(ConnectivityResult.none));
            }

            void _enterFullscreen() {
              setState(() => _fullscreen = true);
              SystemChrome.setPreferredOrientations([DeviceOrientation.landscapeLeft, DeviceOrientation.landscapeRight]);
              SystemChrome.setEnabledSystemUIMode(SystemUiMode.immersiveSticky);
            }

            void _exitFullscreen() {
              setState(() => _fullscreen = false);
              SystemChrome.setPreferredOrientations([DeviceOrientation.portraitUp, DeviceOrientation.portraitDown]);
              SystemChrome.setEnabledSystemUIMode(SystemUiMode.edgeToEdge);
            }

                        Future<void> _handleDownload(String url, String? suggestedFilename, String? mimeType) async {
                        final uri = Uri.parse(url);
                        try {
                          await launchUrl(uri, mode: LaunchMode.externalApplication);
                        } catch (_) {
                          if (mounted) {
                            ScaffoldMessenger.of(context).showSnackBar(
                              const SnackBar(content: Text('تعذّر فتح رابط التحميل')),
                            );
                          }
                        }
                      }



            @override
            Widget build(BuildContext context) {
              return PopScope(
                canPop: false,
                onPopInvokedWithResult: (didPop, _) async {
                  if (didPop) return;
                  if (_fullscreen) { _exitFullscreen(); return; }
                  if (_ctrl != null && await _ctrl!.canGoBack()) { await _ctrl!.goBack(); return; }
                  SystemNavigator.pop();
                },
                child: Scaffold(
                  backgroundColor: Colors.black,
                  body: SafeArea(
                    top: !_fullscreen,
                    bottom: !_fullscreen,
                    child: Stack(children: [

                      InAppWebView(
                        initialUrlRequest: URLRequest(url: WebUri(kAppUrl)),
                        initialSettings: InAppWebViewSettings(
                          javaScriptEnabled: true,
                          javaScriptCanOpenWindowsAutomatically: true,
                          domStorageEnabled: true,
                          databaseEnabled: true,
                          cacheEnabled: true,
                          clearCache: false,
                          allowFileAccessFromFileURLs: true,
                          allowUniversalAccessFromFileURLs: true,
                          thirdPartyCookiesEnabled: true,
                          userAgent: kUserAgent,
                          useShouldOverrideUrlLoading: true,
                          useOnDownloadStart: true,
                          supportZoom: true,
                          builtInZoomControls: false,
                          displayZoomControls: false,
                          supportMultipleWindows: true,
                          mixedContentMode: MixedContentMode.MIXED_CONTENT_ALWAYS_ALLOW,
                          geolocationEnabled: kEnableLocation,
                          mediaPlaybackRequiresUserGesture: false,
                          allowsInlineMediaPlayback: true,
                          allowsAirPlayForMediaPlayback: true,
                          transparentBackground: false,
                        ),

                        onWebViewCreated:  (c) => _ctrl = c,
                        onLoadStart:       (c, url) { if (mounted) setState(() { _loading = true; _error = false; }); },
                        onLoadStop:        (c, url) async {
                          if (mounted) setState(() => _loading = false);
                          final p = await SharedPreferences.getInstance();
                          await p.setString('lastUrl', url?.toString() ?? kAppUrl);
                          _setupMediaBridge(c);
                        },
                        onReceivedError:   (c, req, err) {
                          if (req.isForMainFrame == true && mounted) setState(() { _loading = false; _error = true; });
                        },
                        onEnterFullscreen: (c) => _enterFullscreen(),
                        onExitFullscreen:  (c) => _exitFullscreen(),
                        onPermissionRequest: (c, req) async => PermissionResponse(resources: req.resources, action: PermissionResponseAction.GRANT),
                        onGeolocationPermissionsShowPrompt: (c, origin) async => GeolocationPermissionShowPromptResponse(origin: origin, allow: kEnableLocation, retain: true),
                        shouldOverrideUrlLoading: (c, nav) async {
                          final uri = nav.request.url;
                          if (uri == null) return NavigationActionPolicy.ALLOW;
                          final s = uri.scheme.toLowerCase();
                          if (s == 'http' || s == 'https') return NavigationActionPolicy.ALLOW;
                          if (await canLaunchUrl(uri)) { await launchUrl(uri, mode: LaunchMode.externalApplication); return NavigationActionPolicy.CANCEL; }
                          return NavigationActionPolicy.ALLOW;
                        },
                        onCreateWindow: (c, action) async {
                          showDialog(context: context, builder: (ctx) => AlertDialog(
                            contentPadding: EdgeInsets.zero,
                            content: SizedBox(
                              width: MediaQuery.of(ctx).size.width,
                              height: MediaQuery.of(ctx).size.height * 0.85,
                              child: Column(children: [
                                Align(alignment: Alignment.topRight, child: IconButton(icon: const Icon(Icons.close), onPressed: () => Navigator.pop(ctx))),
                                Expanded(child: InAppWebView(
                                  windowId: action.windowId,
                                  initialSettings: InAppWebViewSettings(javaScriptEnabled: true, thirdPartyCookiesEnabled: true, userAgent: kUserAgent),
                                  onCloseWindow: (c) async { if (Navigator.canPop(ctx)) Navigator.pop(ctx); },
                                )),
                              ]),
                            ),
                          ));
                          return true;
                        },
                        onDownloadStartRequest: (c, req) async {
                          await _handleDownload(req.url.toString(), req.suggestedFilename, req.mimeType);
                        },
                      ),

                      if (_loading && !_error)
                        const Positioned(top: 0, left: 0, right: 0, child: LinearProgressIndicator(backgroundColor: Colors.transparent, color: Colors.blue, minHeight: 3)),

                      if (_offline)
                        Container(color: Colors.white, child: Center(child: Column(mainAxisSize: MainAxisSize.min, children: [
                          const Icon(Icons.wifi_off_rounded, size: 72, color: Color(0xFFE53935)),
                          const SizedBox(height: 16),
                          const Text('لا يوجد اتصال بالإنترنت', style: TextStyle(fontSize: 18, fontWeight: FontWeight.bold)),
                          const SizedBox(height: 8),
                          const Text('تحقق من الاتصال وحاول مجدداً', style: TextStyle(color: Color(0xFF757575))),
                          const SizedBox(height: 24),
                          ElevatedButton.icon(onPressed: () { _checkConnectivity(); _ctrl?.reload(); }, icon: const Icon(Icons.refresh_rounded), label: const Text('إعادة المحاولة')),
                        ]))),

                      if (_error && !_offline)
                        Container(color: Colors.white, child: Center(child: Column(mainAxisSize: MainAxisSize.min, children: [
                          const Icon(Icons.error_outline_rounded, size: 72, color: Color(0xFFFF7043)),
                          const SizedBox(height: 16),
                          const Text('تعذر تحميل الصفحة', style: TextStyle(fontSize: 18, fontWeight: FontWeight.bold)),
                          const SizedBox(height: 24),
                          Row(mainAxisSize: MainAxisSize.min, children: [
                            ElevatedButton.icon(onPressed: () => _ctrl?.reload(), icon: const Icon(Icons.refresh_rounded), label: const Text('إعادة التحميل')),
                            const SizedBox(width: 12),
                            OutlinedButton.icon(onPressed: () => _ctrl?.loadUrl(urlRequest: URLRequest(url: WebUri(kAppUrl))), icon: const Icon(Icons.home_rounded), label: const Text('الرئيسية')),
                          ]),
                        ]))),

                    ]),
                  ),
                ),
              );
            }
          }
          DART

      # ── Step 3c: MainActivity (MediaStore Downloads) ────────────────────
      - name: Inject MainActivity Kotlin
        env:
          APP_SLUG: ${{ env.APP_SLUG }}
        run: |
          PKG_PATH="$APP_SLUG/android/app/src/main/kotlin/com/titan/$APP_SLUG"
          mkdir -p "$PKG_PATH"

          cat > "$PKG_PATH/MainActivity.kt" << 'KOTLIN'
          package com.titan.APP_SLUG_PLACEHOLDER

          import android.content.ContentValues
          import android.content.Intent
          import android.database.Cursor
          import android.graphics.Bitmap
          import android.media.MediaScannerConnection
          import android.media.ThumbnailUtils
          import android.net.Uri
          import android.os.Build
          import android.os.Environment
          import android.provider.MediaStore
          import android.util.Base64
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel
          import java.io.ByteArrayOutputStream
          import java.io.File

          class MainActivity : FlutterActivity() {
            private val CHANNEL = "titan_download"

            override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
              super.configureFlutterEngine(flutterEngine)
              MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL)
                .setMethodCallHandler { call, result ->
                  when (call.method) {

                    "saveToDownloads" -> {
                      val sourcePath = call.argument<String>("sourcePath") ?: ""
                      val fileName   = call.argument<String>("fileName")   ?: "download"
                      val mimeType   = call.argument<String>("mimeType")   ?: "*/*"
                      try {
                        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                          // Android 10+ — MediaStore scoped storage
                          val values = ContentValues().apply {
                            put(MediaStore.Downloads.DISPLAY_NAME, fileName)
                            put(MediaStore.Downloads.MIME_TYPE, mimeType)
                            put(MediaStore.Downloads.IS_PENDING, 1)
                          }
                          val uri = contentResolver.insert(
                            MediaStore.Downloads.EXTERNAL_CONTENT_URI, values
                          )
                          if (uri != null) {
                            contentResolver.openOutputStream(uri)?.use { out ->
                              File(sourcePath).inputStream().use { it.copyTo(out) }
                            }
                            values.clear()
                            values.put(MediaStore.Downloads.IS_PENDING, 0)
                            contentResolver.update(uri, values, null, null)
                            result.success("saved")
                          } else {
                            result.error("MEDIA_STORE_FAIL", "Could not create MediaStore entry", null)
                          }
                        } else {
                          // Android 9 and below — direct filesystem write
                          val dlDir = Environment.getExternalStoragePublicDirectory(
                            Environment.DIRECTORY_DOWNLOADS
                          )
                          dlDir.mkdirs()
                          val dest = File(dlDir, fileName)
                          File(sourcePath).copyTo(dest, overwrite = true)
                          // Notify gallery/file manager
                          MediaScannerConnection.scanFile(
                            this, arrayOf(dest.absolutePath), arrayOf(mimeType), null
                          )
                          result.success("saved")
                        }
                      } catch (e: Exception) {
                        result.error("SAVE_ERROR", e.message ?: "Unknown error", null)
                      }
                    }

                    "openDownloadsFolder" -> {
                      try {
                        val intent = Intent(Intent.ACTION_VIEW).apply {
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                            data = MediaStore.Downloads.EXTERNAL_CONTENT_URI
                          } else {
                            val dlDir = Environment.getExternalStoragePublicDirectory(
                              Environment.DIRECTORY_DOWNLOADS
                            )
                            data = Uri.fromFile(dlDir)
                          }
                          addFlags(Intent.FLAG_ACTIVITY_NEW_TASK)
                        }
                        startActivity(intent)
                        result.success("opened")
                      } catch (e: Exception) {
                        result.error("OPEN_ERROR", e.message ?: "Unknown error", null)
                      }
                    }

                    "openExternalUrl" -> {
                      val url = call.argument<String>("url") ?: ""
                      if (url.isEmpty()) {
                        result.error("INVALID_URL", "URL is empty", null)
                        return@setMethodCallHandler
                      }
                      try {
                        val intent = Intent(Intent.ACTION_VIEW, Uri.parse(url)).apply {
                          addFlags(Intent.FLAG_ACTIVITY_NEW_TASK)
                        }
                        startActivity(intent)
                        result.success("opened")
                      } catch (e: Exception) {
                        result.error("OPEN_ERROR", e.message ?: "Unknown error", null)
                      }
                    }

                    "getDeviceVideos" -> {
                      try {
                        val videos = mutableListOf<Map<String, Any?>>()
                        val projection = arrayOf(
                          MediaStore.Video.Media._ID,
                          MediaStore.Video.Media.DISPLAY_NAME,
                          MediaStore.Video.Media.DURATION,
                          MediaStore.Video.Media.DATA
                        )
                        val sortOrder = "${MediaStore.Video.Media.DATE_MODIFIED} DESC"
                        val cursor: Cursor? = contentResolver.query(
                          MediaStore.Video.Media.EXTERNAL_CONTENT_URI,
                          projection, null, null, sortOrder
                        )
                        cursor?.use { c ->
                          val idCol    = c.getColumnIndexOrThrow(MediaStore.Video.Media._ID)
                          val nameCol  = c.getColumnIndexOrThrow(MediaStore.Video.Media.DISPLAY_NAME)
                          val durCol   = c.getColumnIndexOrThrow(MediaStore.Video.Media.DURATION)
                          val dataCol  = c.getColumnIndexOrThrow(MediaStore.Video.Media.DATA)
                          while (c.moveToNext() && videos.size < 200) {
                            val id       = c.getLong(idCol)
                            val name     = c.getString(nameCol) ?: "Video"
                            val dur      = c.getLong(durCol) / 1000.0   // ms → seconds
                            val filePath = c.getString(dataCol) ?: ""
                            val videoUri = Uri.withAppendedPath(
                              MediaStore.Video.Media.EXTERNAL_CONTENT_URI, id.toString()
                            )
                            // Generate tiny thumbnail (96×96) as base64
                            var thumbB64 = ""
                            try {
                              val bmp: Bitmap? = if (Build.VERSION.SDK_INT >= 29) {
                                contentResolver.loadThumbnail(videoUri, android.util.Size(96, 96), null)
                              } else {
                                @Suppress("DEPRECATION")
                                ThumbnailUtils.createVideoThumbnail(filePath, android.provider.MediaStore.Images.Thumbnails.MINI_KIND)
                              }
                              if (bmp != null) {
                                val bos = ByteArrayOutputStream()
                                bmp.compress(Bitmap.CompressFormat.JPEG, 60, bos)
                                thumbB64 = "data:image/jpeg;base64," +
                                  Base64.encodeToString(bos.toByteArray(), Base64.NO_WRAP)
                                bmp.recycle()
                              }
                            } catch (_: Exception) {}

                            videos.add(mapOf(
                              "url"       to videoUri.toString(),
                              "title"     to name.substringBeforeLast('.'),
                              "duration"  to dur,
                              "thumbnail" to thumbB64
                            ))
                          }
                        }
                        result.success(videos)
                      } catch (e: Exception) {
                        result.error("VIDEO_ERROR", e.message ?: "Unknown error", null)
                      }
                    }

                    else -> result.notImplemented()
                  }
                }
            }
          }
          KOTLIN

          sed -i "s/APP_SLUG_PLACEHOLDER/$APP_SLUG/g" "$PKG_PATH/MainActivity.kt"

      # ── Step 4: Replace placeholders (safe escaping) ─────────────────────────
      - name: Replace Template Variables
        run: |
          APP_SLUG=${{ env.APP_SLUG }}
          APP_URL="${{ github.event.inputs.app_url }}"
          APP_NAME="${{ github.event.inputs.app_name }}"
          LOC="${{ github.event.inputs.enable_location }}"
          NOTIF="${{ github.event.inputs.enable_notifications }}"
          CAM="${{ github.event.inputs.enable_camera }}"
          STOR="${{ github.event.inputs.enable_storage }}"

          URL_ESCAPED=$(printf '%s' "$APP_URL" | sed 's/|/\|/g')

          sed -i "s|PLACEHOLDER_URL|$URL_ESCAPED|g"           "$APP_SLUG/lib/main.dart"
          sed -i "s|PLACEHOLDER_NAME|$APP_NAME|g"             "$APP_SLUG/lib/main.dart"
          sed -i "s|PLACEHOLDER_LOCATION|$LOC|g"              "$APP_SLUG/lib/main.dart"
          sed -i "s|PLACEHOLDER_NOTIFICATIONS|$NOTIF|g"       "$APP_SLUG/lib/main.dart"
          sed -i "s|PLACEHOLDER_CAMERA|$CAM|g"                "$APP_SLUG/lib/main.dart"
          sed -i "s|PLACEHOLDER_STORAGE|$STOR|g"              "$APP_SLUG/lib/main.dart"

      # ── Step 5: App Icon ──────────────────────────────────────────────────────
      - name: Handle App Icon
        run: |
          APP_SLUG=${{ env.APP_SLUG }}
          ICON_URL="${{ github.event.inputs.icon_url }}"

          if [ -n "$ICON_URL" ] && [ "$ICON_URL" != "" ]; then
            curl -L -o /tmp/app_icon.png "$ICON_URL" 2>/dev/null || true
            if [ -f /tmp/app_icon.png ] && [ -s /tmp/app_icon.png ]; then
              sudo apt-get install -y imagemagick 2>/dev/null | tail -1
              for size in 48 72 96 144 192; do
                case $size in
                  48)  dir="mipmap-mdpi"    ;;
                  72)  dir="mipmap-hdpi"    ;;
                  96)  dir="mipmap-xhdpi"   ;;
                  144) dir="mipmap-xxhdpi"  ;;
                  192) dir="mipmap-xxxhdpi" ;;
                esac
                mkdir -p "$APP_SLUG/android/app/src/main/res/$dir"
                convert /tmp/app_icon.png -resize ${size}x${size} \
                  "$APP_SLUG/android/app/src/main/res/$dir/ic_launcher.png" 2>/dev/null || true
                convert /tmp/app_icon.png -resize ${size}x${size} -alpha on \
                  "$APP_SLUG/android/app/src/main/res/$dir/ic_launcher_round.png" 2>/dev/null || true
              done
              echo "✅ Icon applied"
            fi
          fi

      # ── Step 6: Patch ProGuard ────────────────────────────────────────────────
      - name: Patch ProGuard
        run: |
          find ~/.pub-cache/hosted/pub.dev/ -name "build.gradle" \
            -print0 | xargs -0 sed -i "s/getDefaultProguardFile('proguard-android.txt')/getDefaultProguardFile('proguard-android-optimize.txt')/g" 2>/dev/null || true

      # ── Step 7: Build APK ─────────────────────────────────────────────────────
      - name: Build APK
        run: |
          cd "${{ env.APP_SLUG }}"
          flutter build apk --release

      # ── Step 8: Build AAB (for Google Play) ──────────────────────────────────
      - name: Build AAB
        run: |
          cd "${{ env.APP_SLUG }}"
          flutter build appbundle --release

      # ── Step 9: Generate Keystore & Sign ─────────────────────────────────────
      - name: Generate Keystore and Sign APK
        run: |
          APP_SLUG=${{ env.APP_SLUG }}
          APP_NAME="${{ github.event.inputs.app_name }}"
          TRACKING="${{ github.event.inputs.tracking_id }}"

          ALIAS="titan-$(echo $TRACKING | cut -c1-8)"
          KS_PASS="$(openssl rand -hex 16)"
          KEY_PASS="$KS_PASS"

          keytool -genkey -v \
            -keystore /tmp/release.jks \
            -storetype PKCS12 \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias "$ALIAS" \
            -storepass "$KS_PASS" \
            -dname "CN=$APP_NAME, OU=App, O=Titan, L=City, S=State, C=US"

          BUILD_TOOLS=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -1)

          $BUILD_TOOLS/apksigner sign \
            --ks /tmp/release.jks \
            --ks-key-alias "$ALIAS" \
            --ks-pass "pass:$KS_PASS" \
            --key-pass "pass:$KEY_PASS" \
            "$APP_SLUG/build/app/outputs/flutter-apk/app-release.apk"

          echo "KEY_ALIAS=$ALIAS"   >> $GITHUB_ENV
          echo "KS_PASS=$KS_PASS"   >> $GITHUB_ENV
          echo "KEY_PASS=$KEY_PASS"  >> $GITHUB_ENV
          cp /tmp/release.jks /tmp/release-keystore.jks

      # ── Step 10: Create Release Package ───────────────────────────────────────
      - name: Create Release Package
        run: |
          APP_SLUG=${{ env.APP_SLUG }}
          APP_NAME="${{ github.event.inputs.app_name }}"
          APP_URL="${{ github.event.inputs.app_url }}"
          TRACKING="${{ github.event.inputs.tracking_id }}"
          ALIAS="${{ env.KEY_ALIAS }}"
          KS_PASS="${{ env.KS_PASS }}"
          KEY_PASS="${{ env.KEY_PASS }}"
          BUILD_DATE=$(date '+%Y-%m-%d %H:%M UTC')

          mkdir -p /tmp/release-package
          cp "$APP_SLUG/build/app/outputs/flutter-apk/app-release.apk" "/tmp/release-package/${APP_SLUG}-release.apk"
          cp "$APP_SLUG/build/app/outputs/bundle/release/app-release.aab" "/tmp/release-package/${APP_SLUG}-release.aab"
          cp /tmp/release-keystore.jks "/tmp/release-package/release-keystore.jks"

          cat > "/tmp/release-package/README.txt" << 'README'
          ╔══════════════════════════════════════════════════╗
          ║         TITAN WEBVIEW APP — RELEASE PACKAGE      ║
          ╚══════════════════════════════════════════════════╝

          App Name   : $APP_NAME
          App URL    : $APP_URL
          Build Date : $BUILD_DATE
          Tracking ID: $TRACKING

          ── FILES ──────────────────────────────────────────
          ${APP_SLUG}-release.apk  → Install directly on Android
          ${APP_SLUG}-release.aab  → Upload to Google Play Store
          release-keystore.jks     → Keep this safe! Needed for future updates.

          ── KEYSTORE INFO (KEEP PRIVATE!) ──────────────────
          Key Alias      : $ALIAS
          Store Password : $KS_PASS
          Key Password   : $KEY_PASS
          README

          cd /tmp
          zip -r "release-package-${TRACKING}.zip" release-package/
          echo "RELEASE_ZIP=/tmp/release-package-${TRACKING}.zip" >> $GITHUB_ENV

      # ── Step 11: Upload to HF Dataset CDN ────────────────────────────────────
      - name: Upload Release Package to HF Dataset
        env:
          TRACKING: ${{ github.event.inputs.tracking_id }}
          HF_TOKEN: ${{ github.event.inputs.hf_token }}
          HF_DATASET: ${{ github.event.inputs.hf_dataset }}
          RELEASE_ZIP: /tmp/release-package-${{ github.event.inputs.tracking_id }}.zip
        run: |
          pip install huggingface_hub -q

          DOWNLOAD_URL=$(python3 - << 'PYEOF'
          import sys, os
          from huggingface_hub import HfApi

          api = HfApi()
          tracking = os.environ.get("TRACKING")
          hf_dataset = os.environ.get("HF_DATASET")
          hf_token = os.environ.get("HF_TOKEN")
          release_zip = os.environ.get("RELEASE_ZIP")

          path_in_repo = f"builds/{tracking}/release-package.zip"

          try:
              url = api.upload_file(
                  path_or_fileobj=release_zip,
                  path_in_repo=path_in_repo,
                  repo_id=hf_dataset,
                  repo_type="dataset",
                  token=hf_token,
              )
              print(f"https://huggingface.co/{hf_dataset}/resolve/main/{path_in_repo}")
          except Exception as e:
              sys.stderr.write(f"HF upload error: {e}\n")
              print("")
          PYEOF
          )

          if [ -n "$DOWNLOAD_URL" ]; then
            echo "HF_DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV
            echo "✅ Uploaded: $DOWNLOAD_URL"
          else
            echo "❌ HF upload failed"
            echo "HF_DOWNLOAD_URL=" >> $GITHUB_ENV
          fi

      # ── Step 12: Upload GitHub Artifact (backup) ──────────────────────────────
      - name: Upload GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webview-release-package
          path: /tmp/release-package-${{ github.event.inputs.tracking_id }}.zip
          retention-days: 30

      # ── Step 13: Webhook callback ─────────────────────────────────────────────
      - name: Send webhook callback
        if: always()
        run: |
          STATUS="success"
          if [ "${{ job.status }}" != "success" ]; then STATUS="failure"; fi

          DOWNLOAD_URL="${{ env.HF_DOWNLOAD_URL }}"
          TRACKING="${{ github.event.inputs.tracking_id }}"

          curl -s -X POST "${{ github.event.inputs.webhook_url }}?tracking_id=${TRACKING}" \
            -H "Content-Type: application/json" \
            -H "x-github-event: workflow_run" \
            -d "{
              \"action\": \"completed\",
              \"workflow_run\": {
                \"status\": \"completed\",
                \"conclusion\": \"$STATUS\",
                \"html_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
                \"artifacts_url\": \"${{ github.api_url }}/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts\",
                \"head_branch\": \"main\",
                \"hf_download_url\": \"$DOWNLOAD_URL\"
              },
              \"repository\": { \"full_name\": \"${{ github.repository }}\" }
            }"
