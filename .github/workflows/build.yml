name: Titan WebView Builder Pro

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'URL of the app'
        required: true
      app_name:
        description: 'Name of the app'
        required: true
      icon_url:
        description: 'Icon URL (Optional)'
        required: false
        default: ''
      tracking_id:
        description: 'Tracking ID'
        required: true
      webhook_url:
        description: 'Webhook URL'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Flutter WebView project
        run: |
          APP_SLUG=$(echo "${{ github.event.inputs.app_name }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/_/g' \
            | sed 's/__*/_/g' \
            | sed 's/^_//;s/_$//')
          echo "APP_SLUG=$APP_SLUG" >> $GITHUB_ENV

          flutter create \
            --platforms=android \
            --project-name "$APP_SLUG" \
            --org com.titan \
            "$APP_SLUG"

          cd "$APP_SLUG"
          flutter pub add \
            flutter_inappwebview \
            connectivity_plus \
            permission_handler \
            url_launcher \
            shared_preferences

      - name: Inject Permissions and Manifest Settings
        run: |
          APP_SLUG=${{ env.APP_SLUG }}
          APP_NAME="${{ github.event.inputs.app_name }}"
          MANIFEST="$APP_SLUG/android/app/src/main/AndroidManifest.xml"

          # Permissions (تم إضافة صلاحية الإشعارات الخاصة بأندرويد 13+)
          sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\n    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.DOWNLOAD_WITHOUT_NOTIFICATION"/>\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n    <application|' "$MANIFEST"

          # Allow cleartext + enable hardware acceleration
          sed -i 's|<application|<application android:usesCleartextTraffic="true" android:hardwareAccelerated="true"|' "$MANIFEST"

          # App name
          sed -i "s/android:label=\"[^\"]*\"/android:label=\"$APP_NAME\"/" "$MANIFEST"

          # Enable file provider for downloads
          sed -i 's|</application>|    <provider\n            android:name="androidx.core.content.FileProvider"\n            android:authorities="${applicationId}.fileprovider"\n            android:exported="false"\n            android:grantUriPermissions="true">\n            <meta-data\n                android:name="android.support.FILE_PROVIDER_PATHS"\n                android:resource="@xml/file_paths"/>\n        </provider>\n    </application>|' "$MANIFEST"

          # Create file_paths.xml for FileProvider
          mkdir -p "$APP_SLUG/android/app/src/main/res/xml"
          cat > "$APP_SLUG/android/app/src/main/res/xml/file_paths.xml" << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <external-path name="external_files" path="."/>
              <files-path name="internal_files" path="."/>
              <cache-path name="cache" path="."/>
          </paths>
          XML

      - name: Inject Professional main.dart
        run: |
          APP_SLUG=${{ env.APP_SLUG }}
          APP_NAME="${{ github.event.inputs.app_name }}"
          APP_URL="${{ github.event.inputs.app_url }}"

          cat > "$APP_SLUG/lib/main.dart" << 'DART'
          import 'package:flutter/material.dart';
          import 'package:flutter/services.dart';
          import 'package:flutter_inappwebview/flutter_inappwebview.dart';
          import 'package:connectivity_plus/connectivity_plus.dart';
          import 'package:permission_handler/permission_handler.dart';
          import 'package:url_launcher/url_launcher.dart';
          import 'package:shared_preferences/shared_preferences.dart';

          const String kAppUrl = 'PLACEHOLDER_URL';
          const String kAppName = 'PLACEHOLDER_NAME';

          void main() async {
            WidgetsFlutterBinding.ensureInitialized();
            SystemChrome.setEnabledSystemUIMode(SystemUiMode.edgeToEdge);
            // تفعيل الـ cookies للأندرويد
            await CookieManager.instance().setCookie(
              url: WebUri(kAppUrl),
              name: '',
              value: '',
            );
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: kAppName,
                debugShowCheckedModeBanner: false,
                theme: ThemeData(
                  useMaterial3: true,
                  colorScheme: ColorScheme.fromSeed(seedColor: Colors.blue),
                ),
                home: const WebViewPage(),
              );
            }
          }

          class WebViewPage extends StatefulWidget {
            const WebViewPage({super.key});
            @override
            State<WebViewPage> createState() => _WebViewPageState();
          }

          class _WebViewPageState extends State<WebViewPage> with WidgetsBindingObserver {
            InAppWebViewController? _webViewController;
            bool _isLoading = true;
            bool _isOffline = false;
            bool _hasError = false;
            String _currentUrl = kAppUrl;

            @override
            void initState() {
              super.initState();
              WidgetsBinding.instance.addObserver(this);
              _requestPermissions();
              _checkConnectivity();
              _listenConnectivity();
            }

            @override
            void dispose() {
              WidgetsBinding.instance.removeObserver(this);
              super.dispose();
            }

            void _requestPermissions() async {
              // إضافة طلب صلاحية الإشعارات هنا
              await [
                Permission.camera,
                Permission.microphone,
                Permission.storage,
                Permission.notification, 
              ].request();
            }

            void _checkConnectivity() async {
              final result = await Connectivity().checkConnectivity();
              if (mounted) {
                setState(() => _isOffline = result.contains(ConnectivityResult.none));
              }
            }

            void _listenConnectivity() {
              Connectivity().onConnectivityChanged.listen((results) {
                if (mounted) {
                  final wasOffline = _isOffline;
                  setState(() => _isOffline = results.contains(ConnectivityResult.none));
                  if (wasOffline && !_isOffline && _hasError) {
                    _webViewController?.reload();
                  }
                }
              });
            }

            @override
            Widget build(BuildContext context) {
              return PopScope(
                canPop: false,
                onPopInvokedWithResult: (didPop, result) async {
                  if (didPop) return;
                  if (_webViewController != null && await _webViewController!.canGoBack()) {
                    await _webViewController!.goBack();
                  } else {
                    SystemNavigator.pop();
                  }
                },
                child: Scaffold(
                  backgroundColor: Colors.white,
                  body: SafeArea(
                    child: Stack(
                      children: [
                        InAppWebView(
                          initialUrlRequest: URLRequest(url: WebUri(kAppUrl)),
                          initialSettings: InAppWebViewSettings(
                            javaScriptEnabled: true,
                            javaScriptCanOpenWindowsAutomatically: true,
                            thirdPartyCookiesEnabled: true,
                            allowFileAccessFromFileURLs: true,
                            allowUniversalAccessFromFileURLs: true,
                            userAgent: "Mozilla/5.0 (Linux; Android 13; Pixel 7 Build/TQ3A.230805.001) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/116.0.0.0 Mobile Safari/537.36",
                            useShouldOverrideUrlLoading: true,
                            useOnDownloadStart: true,
                            useOnLoadResource: false,
                            supportZoom: true,
                            builtInZoomControls: false,
                            displayZoomControls: false,
                            domStorageEnabled: true,
                            databaseEnabled: true,
                            applicationNameForUserAgent: kAppName,
                            supportMultipleWindows: true, // مهم جداً لتسجيل الدخول
                            cacheEnabled: true,
                            clearCache: false,
                            mixedContentMode: MixedContentMode.MIXED_CONTENT_ALWAYS_ALLOW,
                            geolocationEnabled: true,
                            mediaPlaybackRequiresUserGesture: false,
                          ),
                          onWebViewCreated: (controller) {
                            _webViewController = controller;
                          },
                          onLoadStart: (controller, url) {
                            if (mounted) setState(() {
                              _isLoading = true;
                              _hasError  = false;
                              _currentUrl = url?.toString() ?? kAppUrl;
                            });
                          },
                          onLoadStop: (controller, url) async {
                            if (mounted) setState(() => _isLoading = false);
                            final prefs = await SharedPreferences.getInstance();
                            await prefs.setString('lastUrl', url?.toString() ?? kAppUrl);
                          },
                          onReceivedError: (controller, request, error) {
                            if (request.isForMainFrame == true) {
                              if (mounted) setState(() {
                                _isLoading = false;
                                _hasError  = true;
                              });
                            }
                          },
                          onPermissionRequest: (controller, request) async {
                            return PermissionResponse(
                              resources: request.resources,
                              action: PermissionResponseAction.GRANT,
                            );
                          },
                          onGeolocationPermissionsShowPrompt: (controller, origin) async {
                            return GeolocationPermissionShowPromptResponse(
                              origin: origin,
                              allow: true,
                              retain: true,
                            );
                          },
                          shouldOverrideUrlLoading: (controller, navigationAction) async {
                            final uri = navigationAction.request.url;
                            if (uri == null) return NavigationActionPolicy.ALLOW;

                            final scheme = uri.scheme.toLowerCase();
                            if (scheme == 'http' || scheme == 'https') {
                              return NavigationActionPolicy.ALLOW;
                            }

                            if (await canLaunchUrl(uri)) {
                              await launchUrl(uri, mode: LaunchMode.externalApplication);
                              return NavigationActionPolicy.CANCEL;
                            }

                            return NavigationActionPolicy.ALLOW;
                          },
                          
                          // -- التعديل الجذري لحل مشكلة الشاشة البيضاء في النوافذ المنبثقة --
                          onCreateWindow: (controller, createWindowAction) async {
                            showDialog(
                              context: context,
                              builder: (context) {
                                return AlertDialog(
                                  contentPadding: EdgeInsets.zero,
                                  content: SizedBox(
                                    width: MediaQuery.of(context).size.width,
                                    height: MediaQuery.of(context).size.height * 0.8,
                                    child: Column(
                                      children: [
                                        Align(
                                          alignment: Alignment.topRight,
                                          child: IconButton(
                                            icon: const Icon(Icons.close),
                                            onPressed: () => Navigator.pop(context),
                                          ),
                                        ),
                                        Expanded(
                                          child: InAppWebView(
                                            windowId: createWindowAction.windowId,
                                            initialSettings: InAppWebViewSettings(
                                              javaScriptEnabled: true,
                                              thirdPartyCookiesEnabled: true,
                                              userAgent: "Mozilla/5.0 (Linux; Android 13; Pixel 7 Build/TQ3A.230805.001) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/116.0.0.0 Mobile Safari/537.36",
                                            ),
                                            onCloseWindow: (controller) async {
                                              if (Navigator.canPop(context)) {
                                                Navigator.pop(context);
                                              }
                                            },
                                          ),
                                        ),
                                      ],
                                    ),
                                  ),
                                );
                              },
                            );
                            return true;
                          },
                          // -------------------------------------------------------------

                          onDownloadStartRequest: (controller, downloadStartRequest) async {
                            final url = downloadStartRequest.url.toString();
                            if (await canLaunchUrl(Uri.parse(url))) {
                              await launchUrl(Uri.parse(url), mode: LaunchMode.externalApplication);
                            }
                          },
                        ),

                        // ── Loading Indicator ──
                        if (_isLoading && !_hasError)
                          const Positioned(
                            top: 0, left: 0, right: 0,
                            child: LinearProgressIndicator(
                              backgroundColor: Colors.transparent,
                              color: Colors.blue,
                              minHeight: 3,
                            ),
                          ),

                        // ── Offline Screen ──
                        if (_isOffline)
                          Container(
                            color: Colors.white,
                            child: Center(
                              child: Column(
                                mainAxisSize: MainAxisSize.min,
                                children: [
                                  const Icon(Icons.wifi_off_rounded, size: 72, color: Color(0xFFE53935)),
                                  const SizedBox(height: 16),
                                  const Text(
                                    'لا يوجد اتصال بالإنترنت',
                                    style: TextStyle(fontSize: 18, fontWeight: FontWeight.bold, color: Color(0xFF212121)),
                                  ),
                                  const SizedBox(height: 8),
                                  const Text('تحقق من الاتصال وحاول مجدداً', style: TextStyle(color: Color(0xFF757575))),
                                  const SizedBox(height: 24),
                                  ElevatedButton.icon(
                                    onPressed: () {
                                      _checkConnectivity();
                                      _webViewController?.reload();
                                    },
                                    icon: const Icon(Icons.refresh_rounded),
                                    label: const Text('إعادة المحاولة'),
                                  ),
                                ],
                              ),
                            ),
                          ),

                        // ── Error Screen ──
                        if (_hasError && !_isOffline)
                          Container(
                            color: Colors.white,
                            child: Center(
                              child: Column(
                                mainAxisSize: MainAxisSize.min,
                                children: [
                                  const Icon(Icons.error_outline_rounded, size: 72, color: Color(0xFFFF7043)),
                                  const SizedBox(height: 16),
                                  const Text(
                                    'تعذر تحميل الصفحة',
                                    style: TextStyle(fontSize: 18, fontWeight: FontWeight.bold),
                                  ),
                                  const SizedBox(height: 24),
                                  Row(
                                    mainAxisSize: MainAxisSize.min,
                                    children: [
                                      ElevatedButton.icon(
                                        onPressed: () => _webViewController?.reload(),
                                        icon: const Icon(Icons.refresh_rounded),
                                        label: const Text('إعادة التحميل'),
                                      ),
                                      const SizedBox(width: 12),
                                      OutlinedButton.icon(
                                        onPressed: () => _webViewController?.loadUrl(urlRequest: URLRequest(url: WebUri(kAppUrl))),
                                        icon: const Icon(Icons.home_rounded),
                                        label: const Text('الرئيسية'),
                                      ),
                                    ],
                                  ),
                                ],
                              ),
                            ),
                          ),
                      ],
                    ),
                  ),
                ),
              );
            }
          }
          DART

      - name: Replace Template Variables
        run: |
          APP_SLUG=${{ env.APP_SLUG }}
          APP_NAME="${{ github.event.inputs.app_name }}"
          APP_URL="${{ github.event.inputs.app_url }}"

          # استبدال الـ placeholders بالقيم الحقيقية
          sed -i "s|PLACEHOLDER_URL|$APP_URL|g" "$APP_SLUG/lib/main.dart"
          sed -i "s|PLACEHOLDER_NAME|$APP_NAME|g" "$APP_SLUG/lib/main.dart"

      - name: Handle App Icon
        run: |
          APP_SLUG=${{ env.APP_SLUG }}
          ICON_URL="${{ github.event.inputs.icon_url }}"

          if [ -n "$ICON_URL" ] && [ "$ICON_URL" != "" ]; then
            echo "Downloading icon from: $ICON_URL"
            curl -L -o /tmp/app_icon.png "$ICON_URL" 2>/dev/null || true

            if [ -f /tmp/app_icon.png ] && [ -s /tmp/app_icon.png ]; then
              sudo apt-get install -y imagemagick 2>/dev/null | tail -1

              # Generate all required icon sizes
              for size in 48 72 96 144 192; do
                case $size in
                  48)  dir="mipmap-mdpi"    ;;
                  72)  dir="mipmap-hdpi"    ;;
                  96)  dir="mipmap-xhdpi"   ;;
                  144) dir="mipmap-xxhdpi"  ;;
                  192) dir="mipmap-xxxhdpi" ;;
                esac
                mkdir -p "$APP_SLUG/android/app/src/main/res/$dir"
                convert /tmp/app_icon.png -resize ${size}x${size} \
                  "$APP_SLUG/android/app/src/main/res/$dir/ic_launcher.png" 2>/dev/null || true
              done
              echo "✅ Icon applied successfully"
            else
              echo "⚠️ Icon download failed, using default"
            fi
          else
            echo "ℹ️ No icon URL provided, using default Flutter icon"
          fi

      - name: Patch ProGuard Error
        run: |
          find ~/.pub-cache/hosted/pub.dev/ -name "build.gradle" \
            | xargs sed -i "s/getDefaultProguardFile('proguard-android.txt')/getDefaultProguardFile('proguard-android-optimize.txt')/g" 2>/dev/null || true

      - name: Build APK
        run: |
          cd "${{ env.APP_SLUG }}"
          flutter build apk --release --no-shrink

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webview-apk
          path: "${{ env.APP_SLUG }}/build/app/outputs/flutter-apk/app-release.apk"

      - name: Send webhook callback
        if: always()
        run: |
          STATUS="success"
          if [ "${{ job.status }}" != "success" ]; then STATUS="failure"; fi
          curl -X POST "${{ github.event.inputs.webhook_url }}?tracking_id=${{ github.event.inputs.tracking_id }}" \
            -H "Content-Type: application/json" \
            -H "x-github-event: workflow_run" \
            -d '{
              "action": "completed",
              "workflow_run": {
                "status": "completed",
                "conclusion": "'$STATUS'",
                "html_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                "artifacts_url": "${{ github.api_url }}/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts",
                "head_branch": "main"
              },
              "repository": { "full_name": "${{ github.repository }}" }
            }'
