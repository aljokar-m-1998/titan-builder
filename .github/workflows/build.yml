          class WebViewPage extends StatefulWidget {
            const WebViewPage({super.key});
            @override State<WebViewPage> createState() => _WebViewPageState();
          }

          class _WebViewPageState extends State<WebViewPage> with WidgetsBindingObserver {
            InAppWebViewController? _ctrl;
            bool _loading       = true;
            bool _offline       = false;
            bool _error         = false;
            bool _fullscreen    = false;
            bool _hasLoadedOnce = false;

            // ✅ FIX-OFFLINE: نحسم مصدر التحميل الأول (نت أو نسخة محفوظة) قبل
            // ما الـ WebView يُبنى، عشان الموقع يفتح فورًا من غير ما يحاول
            // النت ويفشل — وبعد كذا الموقع نفسه (Firestore offline) بيكمل
            // العرض من بياناته المحلية المخزّنة فعليًا من قبل.
            bool   _initDecisionMade = false;
            bool   _useOfflineShell  = false;
            String _cachedShellHtml  = '';

            @override
            void initState() {
              super.initState();
              WidgetsBinding.instance.addObserver(this);
              _requestPermissions();
              _checkConnectivity();
              _resolveInitialSource(); // ✅ FIX-OFFLINE
              _setupShareHandling(); // ✅ FIX-SHARE: استقبال مشاركات من تطبيقات تانية
              // FCM_INIT_LISTENERS_PLACEHOLDER
              Connectivity().onConnectivityChanged.listen((r) {
                if (!mounted) return;
                final wasOffline = _offline;
                final nowOffline = r.contains(ConnectivityResult.none);
                setState(() => _offline = nowOffline);
                // ✅ FIX-OFFLINE: نخلي الـ WebView يفضّل الكاش وقت انعدام النت،
                // ويرجع للسلوك الطبيعي (محتوى محدّث) لما النت يرجع
                _ctrl?.setSettings(settings: InAppWebViewSettings(
                  cacheMode: nowOffline ? CacheMode.LOAD_CACHE_ELSE_NETWORK : CacheMode.LOAD_DEFAULT,
                  networkAvailable: !nowOffline,
                ));
                if (wasOffline && !_offline && _error) _ctrl?.reload();
              });
            }

            // ✅ FIX-OFFLINE: لو مفيش نت وقت الفتح، نجرّب نلاقي نسخة محفوظة
            // من آخر تحميل ناجح، ونفتحها بدل ما نحاول النت ونفشل بلا فايدة
            Future<void> _resolveInitialSource() async {
              try {
                final r = await Connectivity().checkConnectivity();
                if (r.contains(ConnectivityResult.none)) {
                  final dir  = await getApplicationDocumentsDirectory();
                  final file = File('${dir.path}/titan_offline_shell.html');
                  if (await file.exists()) {
                    _cachedShellHtml = await file.readAsString();
                    _useOfflineShell = _cachedShellHtml.trim().isNotEmpty;
                  }
                }
              } catch (e) { debugPrint('_resolveInitialSource: $e'); }
              if (mounted) setState(() => _initDecisionMade = true);
            }

            // ✅ FIX-OFFLINE: نخزّن نسخة من الصفحة بعد كل تحميل ناجح عن طريق
            // النت — مش نسخة الـ DOM بعد تعديلات الجافاسكريبت، إنما الاستجابة
            // الأصلية من السيرفر، عشان لما تُعاد فتحها تشتغل بشكل سليم وتقدر
            // تبدأ سكريبتات الموقع تاني من الصفر (Firestore وغيرها)
            Future<void> _cacheShellForOffline() async {
              if (_offline) return;
              try {
                final res  = await Dio().get<String>(kAppUrl,
                    options: Options(responseType: ResponseType.plain));
                final body = res.data ?? '';
                if (body.trim().isEmpty) return;
                final dir  = await getApplicationDocumentsDirectory();
                final file = File('${dir.path}/titan_offline_shell.html');
                await file.writeAsString(body, flush: true);
              } catch (e) { debugPrint('_cacheShellForOffline: $e'); }
            }

            // ✅ FIX-SHARE: حالتين — (تشغيل دافئ) Kotlin يبعت مباشرة عبر setMethodCallHandler
            // و(تشغيل بارد) بنسحب البيانات يدوياً مرة واحدة بعد فتح التطبيق
            void _setupShareHandling() {
              const ch = MethodChannel('titan_download');
              ch.setMethodCallHandler((call) async {
                if (call.method == 'onSharedContent' && call.arguments is Map) {
                  _navigateWithShareData(Map<String, dynamic>.from(call.arguments as Map));
                }
                return null;
              });
              Future.delayed(const Duration(milliseconds: 100), () async {
                try {
                  final data = await ch.invokeMethod<Map>('getPendingShare');
                  if (data != null) {
                    _navigateWithShareData(Map<String, dynamic>.from(data));
                  }
                } catch (_) {}
              });
            }

            // ✅ FIX-SHARE: نبني رابط بنفس معايير share_target.params اللي معلنها الموقع
            // (title/text/url) وننقل الـ WebView له بعد أول تحميل
            void _navigateWithShareData(Map<String, dynamic> data) {
              final title = Uri.encodeQueryComponent((data['title'] ?? '').toString());
              final text  = Uri.encodeQueryComponent((data['text']  ?? '').toString());
              final url   = Uri.encodeQueryComponent((data['url']   ?? '').toString());
              if (title.isEmpty && text.isEmpty && url.isEmpty) return;
              final sep    = kAppUrl.contains('?') ? '&' : '?';
              final target = '$kAppUrl$sep' 'title=$title&text=$text&url=$url';
              Future.delayed(const Duration(milliseconds: 300), () {
                _ctrl?.loadUrl(urlRequest: URLRequest(url: WebUri(target)));
              });
            }

            // ✅ FIX: أزلنا \$ عشان يشتغل Dart string interpolation صح — كان بيعمل مسار غلط
            Future<String> _writeTempFile(List<int> bytes, String name) async {
              final dir  = await getTemporaryDirectory();
              final file = File('${dir.path}/$name');
              await file.writeAsBytes(bytes, flush: true);
              return file.path;
            }

            void _setupMediaBridge(InAppWebViewController ctrl) {
              ctrl.addJavaScriptHandler(
                handlerName: 'titanMediaUpdate',
                callback: (args) {
                  if (args.isEmpty) return;
                  try {
                    final data        = args[0] as Map<String, dynamic>;
                    final playing     = data['playing']     as bool?   ?? false;
                    final rawTitle    = data['title']       as String? ?? '';
